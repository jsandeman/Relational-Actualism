# RA Results Master Registry v0.1
# Date: April 2026
# Purpose: single source-of-truth registry for Relational Actualism results,
# their status, dependencies, paper usage, and storage locations.

status_legend:
  ANC: Active native compiled support (Lean theorem family, no sorry/admit in audited files)
  DR: Derived native result (analytic or mathematical derivation stated in RA primitives)
  CV: Computation-verified result (Python/MD numerical or symbolic verification)
  PI: Provisional interpretation (native result with physical embedding still open)
  CC: Comparative cartography (reader orientation or comparison with existing frameworks)
  ONT: Open native target

native_primitives:
  - finite causal DAG
  - BDG acceptance kernel
  - Local Ledger Condition
  - irreversible actualization
  - structured potentia
  - motif closure/renewal
  - causal severance


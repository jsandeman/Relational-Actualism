- id: RA-SIM-CONCRETE-GRAPH-ORIENT-METHOD-001
  name: v1.5 concrete-graph extraction validates audit machinery only; rescue/topology disconnection means orientation-rescue causal claims require v0.9-graph integration first
  domain: framing
  papers:
  - II
  statement: >
    The v1.5 concrete-graph orientation-link extraction uses a small
    reference corpus of 58 deterministic Python ActualizationDAG-shaped
    objects (chains, balanced/asymmetric branches, diamonds) to derive
    orientation-link witnesses from real parent/child edges with
    topology-derived signs. The honesty progression is now:
    v1.2 surface = hash(row metadata) - demonstrative only;
    v1.3 surface = catalog-derived from RA Lean theorem files - real
    native source involvement, but per-row uniform;
    v1.4 surface = per-graph/per-member tokens combining catalog
    declarations with graph-local cut-role indices - per-member
    variation source identified, but extraction is from simulator state;
    v1.5 surface = concrete graph topology with edge-pair-sign keys -
    real graph topology used as orientation source, but reference corpus
    is parallel-construction, not from v0.9 simulator;
    v1.6+ surface = extraction from v0.9 simulator's actual
    ActualizationDAG instances.

    PRIMARY DISCIPLINE - v1.5 has a rescue/topology disconnection. The
    certification_rescue_rate values come unchanged from v1.0/v0.9 (the
    actual v0.9 simulator runs); the orientation_overlap_v1_5 values
    come from a parallel synthetic corpus that has no causal connection
    to those runs. The mapping from row keys to corpus graphs is a
    deterministic hash (different cells get different graphs by
    construction). Any specificity verdict in v1.5 is therefore a
    correlation between v0.9-simulator-derived rescue and an
    INDEPENDENT hash-keyed sampling of topology - not a measurement of
    how concrete topology drives v0.9 rescue. The +0.028
    augmented_exact_k specificity gap and the -0.147 at_least_k partial
    correlation could both be sampling artifacts of the hash-to-graph
    assignment rather than topology-driven physics signals. The
    inconsistency between the specificity-audit ordering (augmented_
    exact_k stronger) and the partial-correlation ordering (at_least_k
    stronger after support/frontier control) is itself consistent with
    sampling-artifact noise rather than a coherent topology signal. v1.5
    therefore validates that the v1.1 AUDIT MACHINERY operates correctly
    on real topology data (it returns the expected structural-control
    verdicts for selector_stress = not_certification_channel and
    ledger_failure = ledger_control_not_resolved, and computes
    decoupling/matched-strata/partial-correlation as designed); v1.5
    does NOT establish that v0.9 rescue is causally driven by graph-
    topological orientation overlap. Whenever v1.5 outputs are cited,
    the explicit qualifier "audit-machinery validation on independent
    topology, not a topology-causal demonstration on v0.9 simulator
    graphs" must accompany the claim. v1.6+ must integrate
    orientation-overlap extraction with the SAME graph instances that
    produced the rescue rates.
  nature_targets:

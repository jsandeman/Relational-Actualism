  statement: >
    Updated 2026-05-06 after v1.7 canonical keying ablation
    (RA-SIM-ORIENT-KEYING-001 / RA-SIM-ORIENT-KEYING-002,
    EV-2026-05-06-003 / EV-2026-05-06-004). The v1.5 concrete-graph
    orientation-link specificity (+0.028 / -0.002 gap; -0.147 / -0.070
    partial correlations) is RETRACTED: it does not survive matched-
    graph extraction under any of six tested keyings (member_indexed_
    edge_pair, edge_pair_signed_no_member, edge_direction_only,
    incidence_role_signed, catalog_augmented_edge_pair with v1.3
    native catalog tokens, shuffled_overlap_control) at canonical
    scale (n=36 cells per (keying, mode, family_semantics);
    194,400 base trials). The v1.6 reversed-sign matched-graph result
    (gaps -0.146 / -0.229) is also NOT topology-causal anti-specificity:
    the shuffled_overlap_control produces virtually identical negative
    gaps (-0.213 / -0.188) to the four non-member graph-derived keyings
    (-0.211 / -0.191), and the member-indexed keying gives a less-
    reversed gap (-0.161 / -0.102) - so member_idx is not the cause of
    the reversal either. The likely confound is the support_width /
    family-structure / cell-binning relationship; v1.8 will characterize
    this directly. v1.6 closed the rescue/topology disconnection and
    that methodological achievement stands; the v1.5 audit machinery
    works on concrete topology and that stands as provenance. The
    v0.9.2 family-semantics asymmetry remains a v0.9-internal finding
    and is NOT cross-validated by v1.x. Treat
    RA-SIM-ORIENT-KEYING-001 as the controlling result; v1.5
    (RA-SIM-CONCRETE-GRAPH-ORIENT-002) is superseded and v1.6
    (RA-SIM-GRAPH-COUPLED-ORIENT-002) is reclassified as a binning
    artifact.

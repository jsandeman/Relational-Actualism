- id: RA-SIM-CONFOUND-METHOD-001
  name: Joint stratification on at least (support_width × family_size) is required before any matched-graph orientation-overlap rescue claim
  domain: framing
  papers:
  - II
  statement: >
    The v1.8 / v1.8.1 audit chain demonstrates that single-axis stratification
    on support_width is insufficient to disentangle orientation-overlap from
    family structure. Width-only matching produced a transient -0.18 residual
    that joint (support_width × family_size × threshold_fraction × severity)
    matching reduced to |0.003|. Future audits of orientation-overlap effect
    on certification rescue MUST: (a) condition on at least (support_width,
    family_size) jointly before computing any specificity gap; (b) include
    a shuffled-overlap or permutation control evaluated within the SAME
    joint strata (raw-aggregate shuffled controls are insufficient; v1.7
    showed they can match graph keyings at the raw level even when both
    are structural artifacts); (c) report estimability per keying (the
    fraction of strata where the keying produces non-tied orientation
    values within stratum); (d) treat keyings with low estimability under
    joint stratification as candidates whose orientation surface is
    structurally entangled with the stratification variables and therefore
    cannot independently support an orientation-specific inference; (e)
    prefer CELL-level tertile binning (per (keying, mode, family_semantics,
    severity, threshold_fraction)) followed by within-(width, family_size)
    estimability checks, rather than re-tertile-binning within each
    structural stratum -- cell-level binning is the more conservative
    methodology and does not manufacture in-stratum orientation variation
    where the natural surface is structurally co-determined with the
    stratification axes (see RA-SIM-CONFOUND-V18-1-PACKET-001 vs
    RA-SIM-CONFOUND-V18-1-001 for the methodological comparison); (f)
    fixed-bin discipline -- for orientation-overlap rescue claims, bins
    used to define the tested signal must remain fixed across confound
    controls. If joint strata lack both low and high bins under that
    fixed definition, the signal is non-estimable rather than rescued by
    local re-binning. This prevents accidentally creating a signal by
    redefining the variable inside each control stratum.
  nature_targets:
  - methodological standard for orientation-overlap rescue audits
  ra_observable: null
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v1_8_SupportWidthFamilyStructureConfound_May06_2026
  - ra_v1_8_1_joint_width_family_matched_gap.csv
  - ra_v1_8_1_estimability_by_stratum.csv
  - ra_v1_8_1_graph_vs_shuffled_joint_matched.csv
  proof_dependencies: []
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-METHOD-001
  - RA-SIM-ORIENT-KEYING-METHOD-001
  - RA-SIM-V1-5-CORRIGENDUM-METHOD-001
  restoration_preconditions: []
  caveats: >
    This guardrail emerged from the v1.5/v1.6/v1.7/v1.8/v1.8.1 chain.
    Single-axis matching is a documented failure mode (v1.8 Case B
    appeared but did not survive joint stratification). Apply this rule
    to ANY new orientation, orientation-link, or family-overlap audit on
    matched-graph data.
  next_tasks:
  - 'When designing v1.9+ surfaces, encode this rule directly: include estimability_by_stratum and graph_vs_shuffled_joint_matched as standard outputs, and refuse to promote any orientation-specific claim whose joint-matched gap exceeds 0.02 only when paired with a shuffled-control delta exceeding 0.05 in the same strata.'

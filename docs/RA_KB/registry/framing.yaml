- id: RA-SIM-ORIENT-KEYING-METHOD-001
  name: Do not cite orientation-overlap rescue gaps as evidence for orientation-specific certification rescue without matched-graph extraction AND a shuffled overlap control
  domain: framing
  papers:
  - II
  statement: >
    Empirical orientation-specificity rescue gaps from any matched-graph
    orientation-overlap audit must be checked against a shuffled overlap
    control. v1.7 demonstrates that under canonical matched-graph extraction
    (194,400 base trials × 6 keyings) the shuffled_overlap_control keying -
    deterministic null tokens with zero graph content - reproduces the
    "negative_or_reversed_specificity" verdicts of every graph-derived keying
    almost exactly. Citing such a gap as orientation-specific (positive or
    negative) without showing it dissociates from a shuffled control is
    therefore a known artifact pattern. Any new orientation-keying or
    orientation-overlap audit MUST include both a shuffled null and a
    support+frontier OLS partial-correlation control before any
    orientation-specificity inference is drawn.

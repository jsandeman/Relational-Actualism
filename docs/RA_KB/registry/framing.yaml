- id: RA-SIM-V1-5-CORRIGENDUM-METHOD-001
  name: v1.7 canonical keying ablation retracts v1.5 orientation-specificity; v1.6 reversal is a binning artifact, not topology-causal anti-specificity
  domain: framing
  papers:

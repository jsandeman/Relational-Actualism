- id: RA-SIM-GRAPH-COUPLED-ORIENT-METHOD-001
  name: v1.6 graph-coupled extraction is the methodological gold standard but at v1.6 sample size the orientation-rescue signal is below the noise floor (|r|<0.15); both v1.6 specificity reversal and v1.5 specificity assertion are retracted
  domain: framing
  papers:
  - II
  statement: >
    The v1.6 graph-coupled orientation-link extraction is the methodological
    gold standard for any topology-causal orientation-rescue claim, because
    rescue and orientation overlap are extracted from the SAME v0.9
    CausalDAG instance per trial. The honesty progression now reads:
    v1.2 hash(row metadata) -> v1.3 catalog tokens -> v1.4 simulator-state
    tokens -> v1.5 concrete-topology corpus (still hash-keyed to v0.9
    rescue) -> v1.6 graph-coupled (no hash key, same DAG per trial).

    EMPIRICAL UPDATE FROM v1.6 (POST WITNESS-KEYING BUG FIX 2026-05-05):
    The original v1.6 release reported reversed-sign specificity gaps
    (-0.146 / -0.229) on a tiny subset and concluded "v1.5 specificity
    does not replicate." On audit, two issues were uncovered:
    (1) The v1.5/v1.6 edge-pair-sign witness keying had a bug: it
    included `member_idx` in both the sign formula and the witness tag,
    which forced sibling members to produce disjoint witness sets and
    drove intra-family Jaccard to 0 in most cells (18 of 24 in the
    original v1.6 subset had orientation_overlap=0 EXACTLY). Bug fixed:
    sign is now a topological invariant of the edge alone (parity of
    depth(p)+depth(v)), with no member_idx tag; intra-family Jaccard
    now reflects actual cut/edge sharing.
    (2) The original v1.6 subset (1 severity, 1 threshold) had only 4
    cells per (mode x semantics), making the specificity bin assignment
    almost a pure function of support_width. Re-run at full v1.0-matching
    parameter coverage (5 severities x 4 thresholds = 480 per-cell rows,
    80 per (mode x semantics) cell).

    POST-FIX RESULTS at full v1.6 coverage:
    - Decoupling holds: 12/12 cells decoupled.
    - Specificity audit still gives reversed_or_negative verdicts
      (orientation_degradation gap ~ -0.13), but this is a SUPPORT_WIDTH
      CONFOUND: cells with sw=1 have orientation_overlap=0 (single-cut
      family) AND rescue=0 (narrow cuts cannot rescue independent of any
      orientation channel). The specificity audit is sorting cells by
      family-structure-richness, not by orientation-channel signal.
    - Partial-correlation audit (controls for support+frontier) is the
      cleaner test. Results: ledger_failure/at_least_k r=+0.014 (~zero),
      ledger_failure/augmented_exact_k r=+0.132,
      orientation_degradation/at_least_k r=-0.101 (v1.5 direction),
      orientation_degradation/augmented_exact_k r=+0.123 (opposite).
      At n=80 per cell, |r|<0.15 is below the noise floor (p~0.4 for
      r=0.10). NONE of the partial correlations is statistically
      significant.

    HONEST CONCLUSION: At v1.6 sample size, with the bug fixed and the
    disconnection closed, there is NO STATISTICALLY DETECTABLE
    topology-specific correlation between graph_coupled_orientation_link
    overlap and certification_rescue on matched v0.9 simulator graphs -
    in either direction - for this edge-pair-sign keying. The v1.5
    "specificity gap +0.028" was likely an artifact of the keying bug
    plus hash-keyed cell-to-graph mapping; with both eliminated, the
    matched signal is noise. The v1.6 "specificity reversal" verdict is
    a support_width confound; do NOT cite it as topology-causal
    anti-specificity.

    BOTH the v1.5 specificity assertion AND the original v1.6
    "specificity reversal" conclusion are RETRACTED. The v0.9.2
    family-semantics asymmetry remains a v0.9-internal finding; the
    v1.x orientation-link program (v1.2 through v1.6) does NOT provide
    independent topology-causal evidence for or against it at v1.6
    sample size.

    DISCIPLINE - any future orientation-link rescue claim must be:
    (a) measured on matched graphs (same CausalDAG per trial);
    (b) audited via partial correlation against support+frontier
    overlap (specificity-by-quantile is unreliable when cell structure
    correlates with rescue independently of orientation channel);
    (c) verified at sample size that resolves |r|>0.2 reliably (n>200
    per cell);
    (d) tested against multiple orientation keyings before any
    keying-specific conclusion.
  nature_targets:
  - methodological standard for graph-coupled orientation-rescue measurement
  - retraction discipline for hash-keyed cross-validation claims
  - sequencing across v1.2-v1.6 progression

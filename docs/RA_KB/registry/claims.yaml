    orientation_overlap_all_pairs per (keying, mode, family_semantics) and
    computes the low_minus_high rescue gap within fixed support_width
    strata. Headline numbers across non-member graph keyings: raw gap
    -0.198 to -0.209; width-matched gap -0.177 to -0.180 (only ~10%
    explained by support_width alone). Shuffled control: raw -0.193,
    width-matched +0.171 (sign FLIPS) for orientation_degradation/
    at_least_k. This intermediate result transiently suggests Case B
    (residual orientation signal). However, v1.8.1 joint width × family-
    size stratification (RA-SIM-CONFOUND-V18-1-001) shows the residual
    is fully explained once family_size is also conditioned on; v1.8 is
    therefore PRELIMINARY and superseded by v1.8.1 as the controlling

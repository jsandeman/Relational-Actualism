- id: RA-MOTIF-GRAPH-CUT-WITNESS-001
  name: Graph/cut-local orientation witnesses refine graph-orientation closure evidence (Track B.1)
  domain: matter
  papers:
  - II
  statement: >
    Track B.1 formalizes a graph/cut-local orientation witness surface
    `GraphCutOrientationWitness` that bundles, for one support-family
    member, a `GraphSupportCut`, a `GraphOrientationClosureCertificate`,
    an `OrientedN1ThreeFrame`, a cut-local oriented frontier-link
    predicate, and methodological Prop+proof fields
    (`graph_cut_derived`, `no_member_index_labels`). Refinement theorems
    show: (i) the witness induces the deterministic sign source of its
    closure certificate
    (`signSourceOfGraphCutOrientationWitness_eval`); (ii) the witness
    inherits the seven-value N1 ledger surface from its closure
    certificate and three-frame
    (`graphCutOrientationWitness_qN1_seven`); (iii) methodological
    accessors return the recorded proofs of the graph/cut-derived and
    no-member-index-labels guarantees; (iv) an
    `GraphCutOrientationWitnessOverlapProfile` records qualitative
    `low_overlap`/`medium_overlap`/`high_overlap`/
    `same_graph_cut_domain`/`fixed_bin_definition` Prop+proof guardrails
    with `same_domain_of_high` and `fixed_bins` accessors. The module
    imports `RA_MotifComparisonDomainValidity` and
    `RA_GraphOrientationClosure` and asserts no probability law, no
    rescue-rate theorem, and no orientation-specific certification
    rescue claim.
  nature_targets:
  - RA-native graph/cut-local orientation witness extraction surface
  - structural decoupling of orientation-witness evidence from family-member ordering

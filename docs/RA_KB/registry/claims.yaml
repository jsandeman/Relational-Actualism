- id: RA-SIM-SEVERANCE-CHANNEL-005
  name: Strict support-cut width is conjunctive exposure, not redundancy
  domain: complexity
  papers:
  - II
  statement: 'Under the strict conjunctive readiness semantics of RA_MotifCommitProtocol (`GraphReadyAt G Q x := forall y in Q.support, Reachable G y x`), increasing the Hasse-frontier support width of
    a single support cut increases the number of *required* support vertices rather than introducing alternative support paths. The canonical 100-seed v0.6 run shows this directly: under edge_dropout severity
    0.5, causal_reachability loss rises monotonically with width (width 1: 0.72; width 2: 0.83; width 3: 0.94; width 4: 0.97). Wider strict cuts are therefore *more fragile*, not more redundant. True RA-native
    redundancy would require a SupportCutFamily / threshold-readiness abstraction (e.g. `motif M is ready if at least one certified Q in family F is ready`), which is not yet present in the formal layer.'
  nature_targets:
  - distinction between conjunctive support breadth and redundant support capacity
  - monotonic width-fragility behavior under strict conjunctive readiness
  ra_observable: support_width_fragility_curve
  sources:
  - RA_MotifCommitProtocol.lean
  - ra_causal_dag_channel_workbench.py
  - ra_support_width_fragility_curve_v0_6.csv
  - RA_CausalDAG_MotifCommitSimulator_v0_6_ChannelResolvingRedundancy_Report_May05_2026.md
  proof_dependencies:
  - RA-MOTIF-COMMIT-003
  - RA-SIM-SEVERANCE-CHANNEL-001
  - RA-SIM-SEVERANCE-CHANNEL-002
  framing_links:

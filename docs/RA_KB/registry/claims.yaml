- id: RA-SIM-CONFOUND-V18-1-PACKET-001
  name: At cell-level tertile binning, orientation_overlap is nearly a deterministic function of (support_width x family_size); joint matching is not estimable at this scale (Case C, sharper reading of the binning-artifact verdict)
  domain: complexity
  papers:
  - II
  statement: >
    Independent v1.8.1 packet audit on the v1.7 1.17M-row keyed trial rows
    using a stricter binning convention: tertile orientation_overlap at the
    cell level (keying, mode, family_semantics, severity, threshold_fraction)
    rather than within each (support_width x family_size) stratum. Headline:
    estimable_joint_group_fraction_graph = 0.0 - no graph keying cell x
    (support_width x family_size) stratum contains both low and high
    orientation tertile bins. The estimability table shows the structural
    pattern directly: (support_width=1, family_size=1) buckets contain only
    low + medium bins; (support_width=2, family_size=3) only high + medium;
    (support_width=3, family_size=4 or 7) high or high+medium; (support_
    width=4, family_size=11 or 15) only high. Each (width, family_size)
    bucket produces a narrow range of orientation_overlap values that lands
    in one or two adjacent tertile bins, never spanning low and high. This
    is a sharper reading than RA-SIM-CONFOUND-V18-1-001's Case A: instead
    of "the gap collapses to ~0 within strata" (which required re-tertile
    within stratum), the cell-level reading is "the gap is non-estimable
    because orientation_overlap and (width, family_size) are nearly
    co-determined at this scale". Both readings converge on no orientation-
    specific signal under matched-graph extraction; this packet's reading
    is the more methodologically conservative formulation.

  - RA-SIM-V1-SERIES-SYNTHESIS-METHOD-001
  - RA-SIM-CONFOUND-METHOD-001
  - RA-SIM-GRAPH-CUT-WITNESS-METHOD-001
  - RA-SIM-GRAPH-CUT-WITNESS-ACTIVE-METHOD-001
  restoration_preconditions: []
  caveats: 'Canonical-run-confirmed: python scripts/run_trackB_active_graph_witness_extraction.py --seed-start 17 --seed-stop 117 --steps 32 --max-targets 12 --threshold-fractions 1.0,0.75,0.5,0.25 --family-semantics at_least_k,augmented_exact_k completed on 2026-05-06; 100 seeds; 24130 witness rows; 9600 overlap rows; member-index audit confirms `graph_surface_member_index_free=true` and the bad control detects member-index instability. The headline empirical finding is the absence of high-bin coverage: `active_orientation_overlap_bins = low;medium`; `estimable_width_family_strata = 0` (zero of 18 strata have both low and high bins). This means the v0.9 native-certificate-overlap simulator at its default configuration cannot, on its own, produce the matched-graph contrast needed to test orientation-specific certification rescue across the full overlap range - any future rescue analysis must either widen the configuration sweep, change the family-construction semantics, or accept restricted-range conclusions. No orientation-specific certification-rescue claim is made or restored; the v1.9 native-witness six-requirement gate (RA-SIM-V1-SERIES-SYNTHESIS-METHOD-001) remains binding. The packet-original demo (4 seeds, 16 steps, max_targets=6) reported 456 witness rows / 192 overlap rows / 0 estimable strata; the canonical run scales to 100x without changing the qualitative coverage finding. Full audit history: audit_events.csv EV-2026-05-06-019.'
  next_tasks:

- id: RA-SIM-SUPPORT-FAMILY-005
  name: Exact-threshold subfamilies can amplify certification-channel fragility when family members share vulnerable certification surfaces
  domain: complexity
  papers:
  - II
  statement: 'Under exact-threshold subfamily construction (the v0.7 instantiation, where a family at threshold k is exactly the k-subsets of a parent support cut), lowering the threshold from 1.0 toward
    0.25 can INCREASE family readiness loss on certification channels rather than decrease it. Concretely, on the canonical 100-seed run at ledger_failure severity 0.75: strict_loss = 0.439 while threshold-0.25
    family_loss = 0.817. The mechanism is that family members inherit the same parent certification surface; expanding the cut set enlarges the failure surface that "at-least-k-of-n" must now traverse without
    adding new certified evidence. This effect distinguishes exact-threshold subfamilies from monotone augmented redundancy families with member-level independent certification.'

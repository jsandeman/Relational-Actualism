  statement: 'Selected commitment requires certified readiness and selection by a
    local selector closure. Strict commitment further requires exclusion of all
    certified-ready incompatible alternatives at the same causal site. Formalized
    by `DAGSelectedCommitsAt` / `GraphSelectedCommitsAt` (selected branch) versus
    `DAGCommitsAt` / `GraphCommitsAt` (strict branch).'

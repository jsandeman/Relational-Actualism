- id: RA-SIM-CONFOUND-V18-1-002
  name: Pure-graph orientation keyings (no extra noise) are non-estimable under joint width-family stratification - their orientation_overlap is a deterministic function of structural variables
  domain: complexity
  papers:
  - II
  statement: >
    Within the v1.8.1 joint audit, three of five non-member graph keyings
    (edge_pair_signed_no_member, edge_direction_only, incidence_role_signed)
    are non-estimable in 0/36 (mode × family_semantics) cells: the joint
    stratum fixes (mode, family_semantics, threshold_fraction, severity,
    support_width, family_size), and once those are fixed, the underlying
    DAG topology is largely determined and the keyings deterministic
    function of (DAG, cut) is structurally constant across trials in the
    stratum. Their tertile-binning of orientation_overlap therefore
    produces ties (low and high bins have identical orientation_overlap
    values), which the v1.8.1 estimability check correctly rejects. By
    contrast, catalog_augmented_edge_pair (catalog tokens add stochastic
    per-trial variation), member_indexed_edge_pair (member_idx adds
    sibling-position variation), and shuffled_overlap_control (random
    tokens) are joint-estimable in 8.3-58.3 percent of strata. Implication:
    for the pure-graph keyings, what looked like an "orientation-overlap
    rescue gap" was, by construction, a function of the structural
    stratification variables; their orientation surface lacked
    independent variation to support a residual orientation-specific
    inference within joint strata.
  nature_targets:
  - methodological characterization of pure-graph orientation surfaces as structurally entangled with support/family stratification

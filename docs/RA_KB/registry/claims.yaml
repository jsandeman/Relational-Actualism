- id: RA-MOTIF-SUPPORT-FAMILY-RESCUE-TAXONOMY-001
  name: Track A.2 Lean support-family inclusion taxonomy and augmentation rescue refinement for both DAG and Graph layers
  domain: complexity
  papers:
  - II
  statement: >
    Track A.2 isolates the support-family inclusion taxonomy used by
    the robust positive resilience line. Adds DAG/Graph parallel pair
    of FamilyEquivalent (mutual inclusion, with .refl and .symm),
    FamilyStrictlyAugments (one-directional inclusion, with .included
    and .not_reverse_included accessors), FamilyComparable (one
    includes the other), and FamilyIncomparable (neither includes the
    other -- the replacement-style regime where no augmentation
    no-worse theorem is available from inclusion alone).
    CertifiedFamilyAugments adds the certificate-preservation
    morphism: a base certificate context Ξ and an augmented
    certificate context Ξaug satisfy CertifiedFamilyAugments iff the
    base family is included in the augmented family AND every base
    certificate is preserved in Ξaug. The structural payoff
    theorems are: FamilyInternalResilienceAt.mono_certified_augmentation
    (family-internal resilience is preserved by certified-family
    augmentation), and FamilyAugmentationRescueAt
    (Fbase ⊆ Faug, base parent cut not ready, augmented family
    independent-certified-ready) refining via .to_strict_parent_rescue
    into the augmented family's strict-parent rescue and via
    .to_family_internal_resilience / .to_certified_family_ready into
    the augmented family's resilience and readiness. Graph variants
    of all. The module formalizes the augmentation vs replacement
    distinction without committing to any numerical rescue rate.
  nature_targets:
  - RA-native formal surface for additive support-family rescue
  - structural separation of augmentation (no-worse certified rescue) vs replacement (no theorem from inclusion alone)

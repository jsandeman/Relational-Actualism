- id: RA-MOTIF-CERT-CORRELATION-BRIDGE-001
  name: Track A certificate-correlation bridge - qualitative certificate-fate contexts (shared-fate / member-distinct / weakly shared) for both DAG and Graph layers
  domain: complexity
  papers:
  - II
  statement: >
    The certificate-correlation bridge introduces qualitative
    certificate-fate contexts for certified support-family members.
    DAGCertificateFateContext (and its Graph counterpart) carry a
    `coupled` relation on family members with reflexivity / symmetry /
    cert_equiv_of_coupled fields, marking when two members share a
    certificate fate. DAGSharedFateFamily / GraphSharedFateFamily
    abstract the fully-shared endpoint; DAGMemberDistinctFates /
    GraphMemberDistinctFates abstract the member-distinct endpoint;
    DAGWeaklySharedFates / GraphWeaklySharedFates are intentionally
    qualitative markers between the two. DAGCertificateSharingPreorder
    / Graph counterpart are placeholders for any future qualitative
    sharing ordering. Refinement theorems include
    DAGSharedFateFamily.cert_equiv (any two family members have
    equivalent certification status under shared fate),
    DAGSharedFateFamily.certifies_iff_parent (shared-fate collapses to
    parent), DAGMemberDistinctFates.member_distinct_marker (exposes
    the underlying Ξ.member_distinct), DAGMemberDistinctCertificate-
    ResilienceAt and DAGSharedFateResilienceAt with refinements to
    family-internal resilience and certified-family readiness, plus
    .future_mono. The module deliberately does NOT assert a numerical
    monotone law, probability law, rescue-rate curve, or Nature-facing
    prediction; the v0.8 / v0.8.1 simulator decay (RA-SIM-CERT-FAMILY-*,
    RA-SIM-CERT-CORRELATION-*) remains simulation-supported, not Lean-
    derived.

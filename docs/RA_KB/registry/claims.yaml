  - RA-METHOD-002
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-CERT-ANCHOR-METHOD-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-METHOD-001
  - RA-SIM-ORIENTATION-LINK-SURFACE-METHOD-001
  - RA-SIM-NATIVE-ORIENT-LINK-METHOD-001
  - RA-SIM-PER-GRAPH-ORIENT-WITNESS-METHOD-001
  - RA-SIM-CONCRETE-GRAPH-ORIENT-METHOD-001
  - RA-SIM-GRAPH-COUPLED-ORIENT-METHOD-001
  - RA-SIM-V1-5-CORRIGENDUM-METHOD-001
  restoration_preconditions: []
  caveats: >
    BINNING ARTIFACT, NOT TOPOLOGY-CAUSAL ANTI-SPECIFICITY (resolved by
    RA-SIM-ORIENT-KEYING-002, EV-2026-05-06-004). v1.6 reported
    reversed-sign rescue gaps in a 192-trial subset; v1.7 canonical
    keying ablation showed the shuffled_overlap_control (deterministic
    null tokens, no graph content) reproduces the same negative gaps as
    every graph-derived keying. The reversed verdict is therefore not
    measuring orientation specificity at all - it is measuring whatever
    sorting-by-overlap does to the rescue distribution given the
    underlying support_width / family-structure / cell-binning
    relationship. Do NOT cite the v1.6 reversed gap as topology-causal
    anti-specificity. v1.5 specificity is separately retracted by v1.7
    (see RA-SIM-CONCRETE-GRAPH-ORIENT-002 and RA-SIM-ORIENT-KEYING-001).
    Full audit history: audit_events.csv EV-2026-05-05-002,
    EV-2026-05-05-003, EV-2026-05-05-004, EV-2026-05-06-001,
    EV-2026-05-06-002, EV-2026-05-06-003, EV-2026-05-06-004.
  next_tasks:

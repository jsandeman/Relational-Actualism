- id: RA-SIM-GRAPH-CUT-WITNESS-ACTIVE-001
  name: Track B.2 active simulator graph/cut witness extraction is member-index-free, with zero high-bin overlap coverage on canonical 100-seed v0.9 ensemble
  domain: complexity
  papers:
  - II
  statement: >
    The Track B.2 extractor (`ra_active_graph_witness_extraction.py`)
    applies the Track B.1 graph/cut-local orientation-witness token
    surface to live v0.9 native-certificate-overlap simulator graph
    states. On the canonical 100-seed × 32-step × max_targets=12 ×
    threshold_fractions=(1.0, 0.75, 0.5, 0.25) × family_semantics=
    (at_least_k, augmented_exact_k) configuration, it produces 24,130
    member-level witness rows and 9,600 family-overlap rows across 18
    (semantics, support_width, family_size) strata. The
    member-index-free guarantee holds for every audited row
    (`graph_surface_member_index_free=true`), and the bad
    member-indexed control reproduces the family-order-dependent
    instability pattern (`bad_control_detects_member_index_instability=
    true`). The substantive coverage finding is that the active-state
    family-overlap distribution lands entirely in the low and medium
    bins on this configuration; **zero strata** populate both low and
    high bins, so no width × family-size stratum is currently
    estimable for any matched-graph rescue analysis that requires
    contrast across the full overlap range. Three strata under
    `augmented_exact_k` reach two bins (low+medium): support_width=3 /
    family_size=4 (476 rows), (4,5) (440 rows), and (4,7) (220 rows);
    no `at_least_k` stratum reaches more than one bin, except (3,4)
    (3,7) (4,5) (4,11) (4,15) which are medium-only. No
    orientation-specific rescue claim is made: this is an
    infrastructure / coverage diagnostic.
  nature_targets:
  - RA-native actualization-resilience workbench integrity
  - graph/cut-local witness extraction discipline applied to live simulator graph states
  - coverage diagnostic for matched-graph rescue analyses
  ra_observable: null
  sources:
  - RA_TrackB_ActiveSimulatorGraphWitnessExtraction_May06_2026

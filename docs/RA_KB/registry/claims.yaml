- id: RA-SIM-ORIENT-KEYING-001
  name: Canonical matched-graph orientation-keying ablation fails to recover the v1.5 orientation-specific certification-rescue signal under any tested keying
  domain: complexity
  papers:
  - II
  statement: >
    The v1.7 canonical sweep (4 seeds × ... refactored) replays 194,400 matched
    v0.9 trials and computes orientation-link overlap under six keying schemes
    (member_indexed_edge_pair, edge_pair_signed_no_member, edge_direction_only,
    incidence_role_signed, catalog_augmented_edge_pair with v1.3 native catalog
    tokens, shuffled_overlap_control). For orientation_degradation, all six
    keyings give negative_or_reversed_specificity verdicts (low_minus_high gap
    ranging from -0.10 to -0.21 across keyings × semantics) and after support+
    frontier OLS control the partial correlation with rescue is near zero for
    the four non-member graph-derived keyings (-0.024 to +0.068). The
    member-indexed keying gives a uniquely high partial correlation (+0.50 /
    +0.27) but on a near-zero residual standard deviation (0.007-0.016),
    indicating that member_idx ties orientation_overlap to support+frontier
    structure rather than capturing an independent orientation signal. The
    v1.5 +0.028 positive specificity result therefore does NOT replicate under
    any tested matched-graph keying.

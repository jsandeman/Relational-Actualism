- id: RA-SIM-ORIENT-KEYING-002
  name: The v1.6/v1.7 reversed orientation-rescue gaps are consistent with sorting/binning or support-width/family-structure confounding rather than orientation-link specificity
  domain: complexity
  papers:
  - II
  statement: >
    Within the v1.7 canonical sweep, the shuffled_overlap_control keying
    (deterministic null tokens with no graph content) produces specificity
    gaps for orientation_degradation of -0.213 (at_least_k) and -0.188
    (augmented_exact_k) - virtually identical to the four non-member
    graph-derived keyings (-0.211 / -0.191 each). If random tokens produce
    the same negative gap as graph-derived ones, the gap is not measuring
    orientation specificity; it is measuring whatever sorting-by-overlap
    does to the rescue distribution given the underlying cell structure.
    The most likely confound is the support_width / family-structure /
    cell-binning relationship: low-overlap bins are systematically populated
    by narrow-cut family configurations that cannot rescue regardless of
    orientation channel (low_rescue=0 in every cell across every keying).
    Therefore the v1.6/v1.7 reversed-sign verdicts must NOT be cited as
    topology-causal anti-specificity; they are likely binning artifacts.
  nature_targets:
  - identification of binning / family-structure confound in matched-graph orientation-rescue audits
  - methodological discipline against citing reversed orientation gaps without shuffled controls
  ra_observable: orientation_keying_shuffled_control_gap_match
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v1_7_OrientationKeyingAblation_May06_2026
  - ra_v1_7_specificity_by_keying.csv
  - ra_v1_7_permutation_control.csv
  - ra_v1_7_overlap_distribution_by_keying.csv
  proof_dependencies:
  - RA-SIM-ORIENT-KEYING-001
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-METHOD-001
  - RA-SIM-ORIENT-KEYING-METHOD-001
  - RA-SIM-V1-5-CORRIGENDUM-METHOD-001
  restoration_preconditions: []
  caveats: >
    Canonical-scale finding (n=36 per (keying, mode, family_semantics)
    cell; 1,296 per-cell rows; 1.17M keyed rows). Shuffled-control
    matching graph-derived keyings at the v1.7 aggregation level was
    suggestive of a binning artifact; v1.8.1 joint (support_width x
    family_size x threshold x severity) stratification confirms this
    directly: orientation gap collapses to |0.003| under joint matching,
    with graph keyings (where estimable) matching the shuffled control to

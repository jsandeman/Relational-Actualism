- id: RA-SIM-CONFOUND-V18-1-001
  name: v1.8.1 joint (support_width × family_size × threshold × severity) matched audit collapses the orientation rescue gap to ~zero - Case A confirmed
  domain: complexity
  papers:
  - II
  statement: >
    Under joint stratification on (mode, family_semantics, threshold_fraction,
    severity, support_width, family_size) and tertile-binning of
    orientation_overlap within each (keying × stratum), the low_minus_high
    rescue gap collapses to a near-zero residual. For catalog_augmented_edge_pair
    (the graph-derived keying with sufficient orientation variation to be
    joint-estimable; 0.583 estimable strata fraction; 21 strata × ~671
    trials each) the orientation_degradation joint-matched gap is +0.010
    (at_least_k) and +0.003 (augmented_exact_k); the ledger_failure cells
    are -0.004 and -0.002. The shuffled_overlap_control gives joint-matched
    gaps of -0.001 / +0.007 (orientation_degradation) and +0.008 / +0.002
    (ledger_failure). Mean absolute joint-matched gap over graph keyings
    is 0.003; over the shuffled control 0.003; mean absolute graph-minus-
    shuffled delta in joint strata is 0.005. The joint stratification
    explains 100.9% of the raw gap on average for graph keyings - i.e.
    the gap fully collapses within structurally matched strata. This
    confirms the v1.7 reading that the v1.6/v1.7 reversed-sign verdict is
    a binning / family-structure artifact, not topology-causal anti-
    specificity.
  nature_targets:
  - joint-stratified retraction of any orientation-specific rescue interpretation in v1.5/v1.6/v1.7
  - methodological standard for matched-graph orientation-overlap audits (joint width × family_size required)
  ra_observable: joint_width_family_matched_low_minus_high_gap

  statement: 'A selector closure at a causal site selects motif/support-cut pairs only
    when those pairs are certified-ready at that site, and selected pairs must be
    pairwise compatible under the local RA incompatibility relation. Formalized as
    `DAGSelectorClosureAt` (Layer 1) and `GraphSelectorClosureAt` (Layer 2), with
    `DAGSelectedCommitsAt.of_selected` / `GraphSelectedCommitsAt.of_selected` providing
    the witness from selected to selected-commit.'

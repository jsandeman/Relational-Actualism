  name: v1.6 closes the v1.5 rescue/topology disconnection by extracting orientation overlap on the same v0.9 CausalDAG instance per trial
  domain: complexity
  papers:
  - II
  statement: >
    The v1.6 simulator/analysis layer imports the v0.9 simulator
    (ra_causal_dag_native_cert_overlap, ra_causal_dag_channel_workbench,
    ra_causal_dag_support_family_monotonicity) directly and replays a
    constrained subset of v0.9's parameter sweep. For each v0.9 trial it
    calls evaluate_native_overlap_certified_family on a real
    ChannelSeedState to produce a row with certification_rescue_event and
    v0.9 native overlap fields, then inline on the SAME state.dag computes
    a graph_coupled_orientation_link_overlap as the all-pairs mean Jaccard
    across all unordered pairs of edge-pair-sign witnesses across the
    support family cuts. The parent-anchored variant is recorded
    separately as v1_6_parent_anchored_orientation_link_overlap;
    v1_6_overlap_statistic is set to "all_pairs_mean_jaccard" to record
    which one is primary. Rescue and orientation overlap therefore come
    from the same CausalDAG per trial. The v1.5 rescue/topology
    disconnection (rescue from v0.9 simulator runs paired with orientation
    overlap from a parallel synthetic corpus via a deterministic hash) is
    eliminated.

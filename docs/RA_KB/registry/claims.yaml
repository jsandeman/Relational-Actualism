- id: RA-SIM-SUPPORT-FAMILY-007
  name: rescue_rate metric is structurally blind to cert-channel resilience at width >= 2
  domain: complexity
  papers:
  - II
  statement: 'The simulator metric `family_rescue_rate` is defined as the fraction of evaluations where strict_lost_readiness AND family_after_ready. At threshold < 1.0 and width >= 2 in cert modes (ledger_failure,
    orientation_degradation), strict_lost_readiness is structurally false (parent not in family.cuts → cert sampling cannot affect parent → reachability unchanged → strict_after_ready = strict_before_ready).
    Therefore rescue_rate = 0 in those cohorts even when the family genuinely survives a sampling that exhausts most of family.cuts. The rescue metric reports zero NOT because cert-channel resilience is
    absent, but because rescue is defined relative to the parent cut failing first. The "0% cert-channel rescue" reading of RA-SIM-SUPPORT-FAMILY-004 is therefore amended: cert-channel resilience does exist
    (visible in family_loss(threshold) curves), but is invisible to the rescue metric as currently defined.'

- id: RA-SIM-SUPPORT-FAMILY-006
  name: 'Audit corrigendum: cert-channel "amplification" reading of SF-005 is a metric-definition artifact; family_loss(threshold) is non-increasing in cert modes too'
  domain: complexity
  papers:
  - II
  statement: 'A width-stratified audit of the canonical 100-seed v0.7 run shows that the apparent "amplification" claimed in RA-SIM-SUPPORT-FAMILY-005 (family_loss=0.817 > strict_loss=0.439 at ledger_failure
    / sev 0.75 / threshold 0.25) is dominated by a metric-definition artifact: at threshold < 1.0 and width >= 2, the parent cut is structurally NOT a member of family.cuts, so cert-mode sampling (which
    draws uncertified cuts from family.cuts) cannot affect the parent. strict_lost_readiness is therefore identically false in those cohorts. The aggregate strict baseline of 0.439 comes entirely from the
    width=1 cohort (where family={parent}). When the comparison is apples-to-apples — family_loss(threshold) within a fixed width slice — family_loss is monotonically non-increasing as threshold drops,
    including in cert modes. A genuine exact-k structural effect remains: cert-channel resilience requires sufficient family_size that severity-sampling does not exhaust the family (e.g. width=4 / threshold
    0.5 / sev 0.75: family_loss=0.673 vs threshold 1.0: family_loss=1.0).'

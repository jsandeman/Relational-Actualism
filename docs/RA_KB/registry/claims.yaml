- id: RA-MOTIF-COMPARISON-DOMAIN-VALIDITY-001
  name: Track A.3 Lean comparison-domain validity for support-family rescue analysis (DAG and Graph layers)
  domain: complexity
  papers:
  - II
  statement: >
    Track A.3 isolates the v0.7..v0.7.2 metric-repair lesson that
    rescue comparisons across different support-family domains are
    only valid under explicit alignment conditions. Adds DAG/Graph
    parallel pair of CertificateAgreementOnOverlap (Ξ₁ and Ξ₂ agree
    on which cuts they certify, on the overlap of F₁ and F₂),
    ValidFamilyComparison (targetingAligned + exposureAligned +
    FamilyComparable + CertificateAgreementOnOverlap), and
    ValidAugmentationComparison (the stronger predicate for additive
    augmentation comparisons: targetingAligned + exposureAligned +
    CertifiedFamilyAugments). targetingAligned / exposureAligned are
    abstract Prop guardrails supplied by the downstream analysis
    layer, intentionally not derived inside the Lean module.
    ReplacementComparisonDomain captures the FamilyIncomparable case
    explicitly so it can be cited as the regime where no inclusion-
    based rescue theorem is available. Refinement theorems include
    .targeting_aligned / .exposure_aligned / .family_comparable /
    .certificate_agreement (accessors on ValidFamilyComparison),
    .certified_augmentation (accessor on ValidAugmentationComparison
    yielding CertifiedFamilyAugments), and
    .to_family_internal_resilience / .to_augmentation_rescue
    (refinements from ValidAugmentationComparison + base data into
    Layer 1 / Layer 4 rescue predicates). ReplacementComparisonDomain
    .incomparable accessor exposes the underlying FamilyIncomparable
    witness. The module formalizes the apples-to-apples acceptance
    criterion structurally; it does not derive any numerical
    comparison_valid_rate.
  nature_targets:

  - RA-METHOD-002
  - RA-MOTIF-COMMIT-METHOD-001
  - RA-SIM-SEVERANCE-CHANNEL-METHOD-001
  - RA-SIM-SUPPORT-FAMILY-METHOD-001
  restoration_preconditions: []
  caveats: This is a conceptual / interpretive correction surfaced by the canonical v0.6 run. Earlier packet language (and the v0.6 packet directory name) used "redundancy" loosely; the canonical data and
    the strict semantics of GraphReadyAt show the current width axis behaves as conjunctive exposure. Promoting genuine redundancy to a formal claim requires the SupportCutFamily abstraction proposed for
    v0.7.
  next_tasks:
  - Build RA_MotifSupportFamilyBridge.lean introducing SupportCutFamily, AnyCutReadyAt, ThresholdReadyAt, FamilyCommitsAt.
  - Build v0.7 simulator comparing conjunctive support width vs alternative support family redundancy on the same severance modes.

- id: RA-SIM-GRAPH-COUPLED-ORIENT-002
  name: The v1.6 member-indexed edge-pair-sign extractor does not replicate the v1.5 orientation-specificity signal on a small matched-graph subset (keying-tainted, pending v1.7 ablation)
  domain: complexity
  papers:
  - II
  statement: >
    The v1.6 specificity audit on graph-coupled (rescue, orientation_overlap)
    pairs gives reversed_or_negative verdicts for both orientation_degradation
    family-semantics cells in the v1.6 SUBSET diagnostic run: low_minus_high
    rescue gap = -0.146 (at_least_k) and -0.229 (augmented_exact_k); the
    sign is OPPOSITE the v1.5 "low orientation_overlap correlates with high
    rescue" claim (which reported gaps +0.028 / -0.002 on the
    disconnected-corpus version). selector_stress correctly registers
    not_certification_channel; ledger_failure correctly registers
    ledger_control_not_resolved_by_graph_coupled_orientation (gaps
    -0.375 / -0.292). The partial-correlation audit at the v1.6 subset
    sample size (n=4 per cell after aggregation) gives high-variance
    estimates: ledger_failure/at_least_k +0.927, ledger_failure/
    augmented_exact_k -0.654, orientation_degradation/at_least_k -0.523,
    orientation_degradation/augmented_exact_k -0.023; the selector_stress
    cells have rescue_residual_std = 0 and partial_corr undefined.
    These numbers are NOT a topology-causal conclusion in either
    direction. Two compounding factors taint the empirical reading:
    (i) the v1.6 witness function STILL keys orientation tokens on
    `(depth(v) + depth(p) + member_idx) % 2` plus a `:m{member_idx % 3}`
    tag (see RA-SIM-GRAPH-COUPLED-ORIENT-001 caveats for commit
    history; the b742034 fix that removed member_idx was reverted by
    3b40be2), so the orientation-link token mixes graph incidence with
    arbitrary family-member position; (ii) only four per-cell rows are
    available for both the specificity bins and the post-aggregation
    partial correlations. The honest reading is therefore: the v1.6
    member-indexed edge-pair-sign extractor does not replicate the
    v1.5 orientation-specificity signal on this matched-graph subset.
    This neither retracts nor confirms the v1.5 specificity result;
    the v1.5 source carries the same member_idx keying flaw, so v1.5
    and v1.6 are both keying-tainted and a v1.7 keying-ablation
    canonical sweep is required to discriminate keying-artifact effects
    from topology-causal effects.
  nature_targets:
  - empirical evaluation of orientation specificity on matched-graph pairs
  - retraction of v1.5 cross-validation claim for the v0.9.2 family-semantics asymmetry
  ra_observable: graph_coupled_orientation_specificity
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v1_6_GraphCoupledOrientationExtraction_May05_2026
  - ra_v1_6_specificity.csv
  - ra_v1_6_partial_correlation.csv
  proof_dependencies:
  - RA-SIM-GRAPH-COUPLED-ORIENT-001
  framing_links:

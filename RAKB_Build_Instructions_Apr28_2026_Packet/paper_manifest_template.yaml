# docs/RA_Canonical_Papers/paper_manifest.yaml
# Purpose:
#   Make the RAKB paper-generation workflow independent of date/version-specific filenames.
#   Scripts should use this manifest as the canonical list of current paper sources.

suite_version: "v0.5.1"
canonical_root: "docs/RA_Canonical_Papers"
rakb_registry_root: "docs/RA_KB/registry"
style_file: "common/ra_suite.sty"
bib_file: "common/ra_references.bib"
generated_root: "docs/RA_Canonical_Papers/RAKB_TeX_RAKB_IDs/current"

papers:

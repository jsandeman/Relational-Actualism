- id: RA-MOTIF-ORIENT-SUPPORT-003
  name: Selected orientation commitment carries Hasse-frontier reachability
  domain: motif_actualization
  papers:
  - II
  statement: In a graph-orientation actualization context, a selected commitment carries an oriented support witness and entails reachability from every Hasse-frontier support vertex of that witness to the selected site.
  formal_anchor: 'RA_MotifOrientationSupportBridge: GraphOrientationSelectedCommitsAt.has_oriented_frontier_witness'
  sources:
  - RA_MotifOrientationSupportBridge.lean
  - RA_MotifOrientationSupportBridge_FormalBridge_Report_May04_2026.md
  proof_dependencies:
  - RA-MOTIF-SELECTOR-006
  - RA-MOTIF-ORIENT-SUPPORT-001
  - RA-MOTIF-ORIENT-SUPPORT-002
  methodological_guardrails:
  - RA-METHOD-001
  - RA-METHOD-002
  legacy_proof_status: DR
  legacy_support_status: DR
  auxiliary_support_status: source_level_formal_bridge_pending_compile
  caveats: This is a bridge theorem; it does not assert that every RA actualization has already been reduced to graph-orientation support.
  next_tasks:

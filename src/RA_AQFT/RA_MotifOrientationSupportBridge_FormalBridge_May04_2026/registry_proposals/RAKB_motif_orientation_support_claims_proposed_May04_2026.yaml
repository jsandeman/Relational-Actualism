- id: RA-MOTIF-ORIENT-SUPPORT-001
  name: Graph-oriented motif support witnesses certify finite frontier support
  domain: motif_actualization
  papers:
  - II
  statement: A graph-oriented motif support witness combines a motif carrier, a graph-native Hasse candidate past, a graph-orientation closure certificate, and local frontier/ledger sufficiency obligations; when certified, its support cut is the finite Hasse-frontier support cut for that past.
  formal_anchor: 'RA_MotifOrientationSupportBridge: GraphOrientedMotifSupport; GraphOrientedMotifSupport.certified; GraphOrientedMotifSupport.support_eq_hasse_frontier'
  sources:
  - RA_MotifOrientationSupportBridge.lean
  - RA_MotifOrientationSupportBridge_FormalBridge_Report_May04_2026.md
  proof_dependencies:
  - RA-MOTIF-COMMIT-005
  - RA-MOTIF-COMMIT-006
  - RA-MOTIF-SELECTOR-001
  - RA_GraphOrientationClosure
  methodological_guardrails:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-MOTIF-COMMIT-METHOD-001
  legacy_proof_status: DR
  legacy_support_status: DR
  auxiliary_support_status: source_level_formal_bridge_pending_compile
  caveats: The witness still contains proposition-valued frontier sufficiency and local ledger compatibility obligations; the hard derivation of those obligations is downstream.
  next_tasks:
  - Compile RA_MotifOrientationSupportBridge locally.
  - Replace proposition-valued sufficiency obligations with concrete RA graph/frontier/ledger derivations where possible.
  packet_origin: RA_MotifOrientationSupportBridge_FormalBridge_May04_2026

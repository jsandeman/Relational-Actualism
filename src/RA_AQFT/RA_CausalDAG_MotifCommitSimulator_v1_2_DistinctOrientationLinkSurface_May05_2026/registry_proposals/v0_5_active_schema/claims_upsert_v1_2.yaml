claims:
- id: RA-MOTIF-ORIENTATION-LINK-SURFACE-001
  name: Distinct orientation-link surfaces refine generic orientation component evidence
  domain: matter
  papers:
  - II
  statement: >
    A distinct orientation-link certificate surface can be packaged as
    Type-valued witness evidence that refines the generic orientation
    component of native certificate witnesses, for both DAG and Graph
    layers. Distinct orientation-link evidence supplies the older
    orientation component surface via a refinement morphism, without
    asserting any numerical rescue law or probability.
  nature_targets:
  - RA-native orientation witness structure
  - separation of orientation-link evidence from generic orientation component
  ra_observable: null
  sources:
  - RA_MotifOrientationLinkSurface.lean
  proof_dependencies:
  - RA-MOTIF-NATIVE-CERT-COMPONENTS-001
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-MOTIF-COMMIT-METHOD-001
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-CERT-ROBUST-METHOD-001
  - RA-SIM-NATIVE-CERT-CALIB-METHOD-001
  - RA-SIM-NATIVE-CERT-ANCHOR-METHOD-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-METHOD-001
  - RA-SIM-ORIENTATION-LINK-SURFACE-METHOD-001
  restoration_preconditions: []
  caveats: 'Lake-build-confirmed (assistant-side `lake build RA_MotifOrientationLinkSurface` closed with 8277/8277 jobs, ~171s; no sorry/admit/axiom). The module imports only RA_MotifNativeCertificateComponents and adds DAGOrientationLinkSurfaceContext / GraphOrientationLinkSurfaceContext (Type-valued orientationLinkEvidence + orientationLinkRefinesComponent morphism into the v1.0 component context), DAGHasOrientationLinkSurface / GraphHasOrientationLinkSurface predicates, and refinement theorems .to_orientation_component (DAG + Graph parallel pair) plus qualitative DAGOrientationLinkOverlapProfile / GraphOrientationLinkOverlapProfile structures. Two fixes were required to compile against the installed v1.0 module: (1) the packet original referenced a field name `orientationEvidence` but v1.0 uses `orientationComponent`; (2) the packet original applied `DAGNativeCertificateComponentContext G Γ M F Ξ Ω` with all six arguments explicit, but v1.0 only takes Ω explicit (the rest are inferred). Installed SHA differs from packet original; documented in artifacts.csv notes. The bridge is qualitative - it adds a witness-refinement structure but asserts no numerical orientation-rescue law or probability.'
  next_tasks:
  - Constrain or replace the abstract orientationLinkEvidence with concrete native orientation-link / sign-source structures sourced from RA_CausalOrientation_Core, RA_D1_NativeLedgerOrientation, RA_D1_NativeClosure rather than treating it as opaque Type-valued evidence.

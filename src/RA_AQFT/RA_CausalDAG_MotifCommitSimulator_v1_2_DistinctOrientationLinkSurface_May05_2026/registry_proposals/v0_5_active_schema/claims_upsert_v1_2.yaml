- id: RA-SIM-ORIENTATION-LINK-SURFACE-001
  name: v1.2 demonstrates that a decoupled orientation-link surface restores orientation specificity in the v1.1 audit
  domain: complexity
  papers:
  - II
  statement: >
    The v1.2 simulator/analysis layer introduces an orientation-link overlap
    surface that is operationally distinct from support and frontier overlap
    (synthesized from row metadata rather than from cut-vertex membership) and
    demonstrates that under matched support/frontier strata, orientation-degradation
    rescue varies with this surface in a way the v1.1 audit machinery
    correctly identifies as orientation-specific. v1.2 is therefore evidence
    that the v1.1 audit machinery is sound; it is NOT a derivation of an
    orientation-specific rescue law from native orientation-link witness data.
  nature_targets:
  - RA-native certification-family diagnostics
  - audit-machinery soundness for orientation-channel attribution
  ra_observable: orientation_link_overlap
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v1_2_DistinctOrientationLinkSurface_May05_2026
  - ra_orientation_link_surface.py
  - ra_orientation_link_surface_v1_2.csv
  - ra_orientation_support_decoupling_audit_v1_2.csv
  - ra_orientation_matched_strata_v1_2.csv
  - ra_orientation_specificity_after_support_control_v1_2.csv
  - ra_component_overlap_rank_by_mode_v1_2.csv
  proof_dependencies:
  - RA-SIM-NATIVE-CERT-ANCHOR-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-002
  - RA-MOTIF-ORIENTATION-LINK-SURFACE-001
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-CERT-ROBUST-METHOD-001
  - RA-SIM-NATIVE-CERT-CALIB-METHOD-001
  - RA-SIM-NATIVE-CERT-ANCHOR-METHOD-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-METHOD-001
  - RA-SIM-ORIENTATION-LINK-SURFACE-METHOD-001
  restoration_preconditions: []
  caveats: 'Confirmed by canonical v1.2 run (assistant-side; --input-dir
    ../RA_CausalDAG_MotifCommitSimulator_v1_0_NativeCertificateAnchoring_May05_2026/outputs)
    over the 480 v1.0 component rows. orientation_link_overlap is decoupled
    from support/frontier overlap (max_abs_diff 0.82-0.92 by mode,
    mean_abs_diff 0.37-0.40); matched_orientation_variation_available=true
    with all 3 (low/medium/high) orientation_link_bins populated in every
    support_frontier_bin; orientation_specificity_resolved=true with
    rescue_gap +0.116 to +0.153 (augmented_exact_k) / +0.117 to +0.233
    (at_least_k) for orientation_degradation; component_rank confirms
    orientation_link_overlap has independent variation after support/frontier
    control (residual_std=0.222) while legacy orientation_overlap has
    residual_std=1.2e-15 (still confounded as expected, since v1.0 input
    is unchanged); ledger_overlap remains decoupled (residual_std=0.009).
    selector_stress remains not_certification_channel. CRITICAL HONESTY
    CAVEAT - v1.2 result is demonstrative, not derivative. The
    orientation_link_overlap surface is SYNTHESIZED from row metadata
    (mode/severity/threshold/support_width hash), not derived from actual
    orientation-link witness data. v1.2 therefore confirms that the v1.1
    audit machinery is sound and would correctly resolve orientation
    specificity IF a real distinct orientation-link surface were provided;
    v1.2 does NOT prove that orientation_degradation rescue in Nature is
    controlled by orientation-link overlap. The blocker has shifted from
    "is the audit machinery sound?" (yes, demonstrated) to "produce a real
    orientation-link surface from native witness data". Until that real
    surface is in place, no orientation-specific Nature claim should be
    promoted.'
  next_tasks:

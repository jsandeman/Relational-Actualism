- id: RA-MOTIF-SUPPORT-FAMILY-MONO-001
  name: Support-family inclusion is an RA-native augmentation relation
  domain: matter
  papers:
  - II
  statement: 'A support-cut family can be ordered by inclusion: every support cut
    accepted by a smaller family is also accepted by an augmented family. This relation
    captures the formal condition under which adding alternative support cuts is monotone
    rather than replacement-like.'
  nature_targets:
  - RA-native actualization support structure
  - formal distinction between support-family replacement and augmentation
  ra_observable: null
  sources:

registry_version: v0.5-proposal
claims:
- id: RA-SIM-MOTIF-ORIENT-001
  name: Simulator v0.4 implements orientation-gated support certification
  domain: complexity
  papers:
  - II
  statement: >-
    The v0.4 causal-DAG simulator requires a graph-oriented support witness before a motif
    candidate can count as supported by its causal support cut.
  nature_targets:
  - RA-native actualization dynamics on finite causal graphs
  - support-certification behavior of motif candidates
  - selector-mediated actualization behavior under oriented conflict
  ra_observable: null
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v0_4_May04_2026/simulator/ra_causal_dag_simulator.py
  - RA_CausalDAG_MotifCommitSimulator_v0_4_May04_2026/tests/test_v0_4_orientation_support.py
  - RA_CausalDAG_MotifCommitSimulator_v0_4_May04_2026/reports/RA_CausalDAG_MotifCommitSimulator_v0_4_May04_2026_Report.md
  proof_dependencies:
  - RA-MOTIF-ORIENT-SUPPORT-001
  - RA-MOTIF-ORIENT-SUPPORT-002
  - RA-MOTIF-COMMIT-007
  restoration_preconditions: []
  caveats: >-
    This is a simulator-validated modeling claim, not a Lean theorem. The simulator
    uses an operational carrier-representation proxy documented in the report.
  next_tasks:

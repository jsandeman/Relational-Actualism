- id: RA-SIM-MOTIF-ORIENT-002
  name: Orientation witness gates separate finite support from certified orientation support
  domain: complexity
  papers:
  - II
  statement: >-
    A finite Hasse-frontier support cut is not sufficient by itself in simulator v0.4;
    certification also requires frontier sufficiency, local ledger compatibility, selector
    compatibility, native-evidence discipline, valid sign links, and seven-value N1 ledger
    evidence.

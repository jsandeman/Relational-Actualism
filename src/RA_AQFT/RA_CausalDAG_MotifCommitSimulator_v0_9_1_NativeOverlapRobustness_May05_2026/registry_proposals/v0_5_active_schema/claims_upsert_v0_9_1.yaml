# v0.5 active-schema upsert for v0.9.1 native-overlap robustness packet.
# Append the entries below to docs/RA_KB/registry/claims.yaml under the
# top-level `claims:` list (do NOT include the `registry_version` line).
#
# Status convention mirrors v0.8.1 cert-correlation analysis: pure-analysis
# packet promoted to `simulation_validated_canonical_run_confirmed` after
# successful canonical run against v0.9 (and v0.8.1 for external alignment).

claims:
- id: RA-SIM-NATIVE-CERT-ROBUST-001
  name: Native certificate-overlap rescue is robust under component-ablation analysis
  domain: complexity
  papers:
  - II
  - III
  statement: >
    The v0.9.1 analysis evaluates the v0.9 native certificate-overlap rescue
    signature under one-component ablations of support, frontier, orientation,
    ledger, causal-past, BDG-kernel-proxy, and firewall-overlap components.
    Across all 7 single-component ablations and all populated (mode,
    family_semantics) groups in the canonical 100-seed v0.9 run, the
    low-to-high overlap-bin rescue ordering remains monotone non-increasing.
  nature_targets:
  - RA-native certification-witness resilience diagnostics
  ra_observable: native_certificate_overlap_component_ablation
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v0_9_1_NativeOverlapRobustness_May05_2026
  - ra_native_overlap_robustness_summary_v0_9_1.md
  proof_dependencies:
  - RA-SIM-NATIVE-CERT-OVERLAP-001
  - RA-SIM-NATIVE-CERT-OVERLAP-002
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-CERT-ROBUST-METHOD-001
  restoration_preconditions: []
  caveats: 'Confirmed by canonical v0.9.1 analysis (assistant-side; --input-dir
    ../RA_CausalDAG_MotifCommitSimulator_v0_9_NativeCertificateOverlap_May05_2026/outputs
    --external-correlation-dir
    ../RA_CausalDAG_MotifCommitSimulator_v0_8_1_CertCorrelationAnalysis_May05_2026/outputs)
    against the canonical 480,000-evaluation v0.9 component-overlap rows.
    component_rows=480, ablation_rows=48 (7 components + baseline x 6 mode/semantics
    cells), ablation_monotone_pass_rate=1.0. Endpoint audit shows native-overlap
    certification rescue substantially separates from the parent-shared baseline:
    endpoint_rescue_max_delta_native_minus_parent=0.5,
    endpoint_resilience_max_delta_native_minus_parent=0.667. Selector-stress
    guardrail passed (selector_guardrail_passed=true). Note: the
    ledger_failure / at_least_k cell collapses to a 0 baseline low-high gap and
    0 across all ablations - the rescue signal lives in augmented_exact_k
    semantics for both modes, consistent with the family-semantics asymmetry
    seen in prior v0.7.x audits. Operational diagnostic; component weights are
    proxy-level operational choices pending native/BDG-LLC formal anchoring.'
  next_tasks:
  - Tighten witness-overlap formalization beyond Type-valued opaque witnesses in the v0.9 Lean bridge.
  - Promote a per-component native-overlap definition into a derived RA-native bridge with formal anchor.
  source_status:
    ra_native_overlap_robustness_analysis.py: simulation_validated_canonical_run_confirmed
  legacy_proof_status: DR
  proof_status: simulation_validated_canonical_run_confirmed
  legacy_support_status: none
  auxiliary_support_status: simulation_canonical_run_recorded
  claim_kind: derived_result
  formal_anchor: ra_native_overlap_robustness_analysis.py ; ra_native_overlap_component_ablation_v0_9_1.csv
  packet_origin: RA_CausalDAG_MotifCommitSimulator_v0_9_1_NativeOverlapRobustness_May05_2026

- id: RA-SIM-NATIVE-CERT-ROBUST-002
  name: Native overlap signature admits overlap-weight sensitivity analysis
  domain: complexity
  papers:
  - II
  - III
  statement: >
    The v0.9.1 analysis recomputes native-overlap rescue diagnostics under
    six overlap-weight profiles (balanced, support_frontier_heavy,
    ledger_heavy, orientation_heavy, bdg_firewall_heavy, causal_past_heavy)
    and verifies that the low-to-high overlap-bin rescue ordering survives
    weighting variation. The native-overlap-induced rescue curves are also
    aligned against the v0.8.1 external-correlation rescue AUCs.
  nature_targets:
  - overlap-weight robustness for certification-witness resilience
  - cross-validation between native-overlap and external-correlation rescue curves
  ra_observable: native_overlap_weight_sensitivity
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v0_9_1_NativeOverlapRobustness_May05_2026
  - ra_native_overlap_weight_sensitivity_v0_9_1.csv
  - ra_native_overlap_external_correlation_alignment_v0_9_1.csv
  proof_dependencies:
  - RA-SIM-NATIVE-CERT-ROBUST-001
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-CERT-ROBUST-METHOD-001
  restoration_preconditions: []
  caveats: 'Confirmed by canonical v0.9.1 run (parameters as in
    RA-SIM-NATIVE-CERT-ROBUST-001). weight_sensitivity_rows=36 (6 profiles x 6
    mode/semantics cells), weight_sensitivity_monotone_pass_rate=1.0,
    balanced_low_high_gap_mean=0.0576 (range [0.0, 0.175]). External-correlation
    alignment loaded for both modes and both family semantics; native rescue
    AUC proxies (range 0.079-0.105) sit slightly above v0.8.1 external AUCs
    (range 0.044-0.049); native rescue decays (0.157-0.218) exceed external
    decays (0.089-0.100). Qualitative direction matches; native curves are
    steeper than the external-correlation baseline. Weight profiles are
    diagnostic; no profile is claimed as the derived RA-native overlap law.'
  next_tasks:
  - Decompose witness-overlap components beyond proxy-level definitions; close the BDG-LLC kernel-overlap proxy with native bridge.
  source_status:
    ra_native_overlap_robustness_analysis.py: simulation_validated_canonical_run_confirmed
  legacy_proof_status: DR
  proof_status: simulation_validated_canonical_run_confirmed
  legacy_support_status: none
  auxiliary_support_status: simulation_canonical_run_recorded
  claim_kind: derived_result
  formal_anchor: ra_native_overlap_robustness_analysis.py ; ra_native_overlap_weight_sensitivity_v0_9_1.csv ; ra_native_overlap_external_correlation_alignment_v0_9_1.csv
  packet_origin: RA_CausalDAG_MotifCommitSimulator_v0_9_1_NativeOverlapRobustness_May05_2026

- id: RA-SIM-NATIVE-CERT-ROBUST-003
  name: Native overlap component attribution identifies signal-carrying witness components
  domain: complexity
  papers:
  - II
  - III
  statement: >
    The v0.9.1 analysis defines a component-importance score by comparing
    baseline low-high rescue gaps with single-component-ablated low-high
    rescue gaps, providing an operational attribution of which witness-overlap
    components carry the certification-rescue signal in the canonical v0.9 run.
  nature_targets:
  - native witness-overlap signal attribution
  ra_observable: native_overlap_component_importance_score
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v0_9_1_NativeOverlapRobustness_May05_2026
  - ra_native_overlap_signal_attribution_v0_9_1.csv
  proof_dependencies:
  - RA-SIM-NATIVE-CERT-ROBUST-001
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-CERT-ROBUST-METHOD-001
  restoration_preconditions: []
  caveats: 'Confirmed by canonical v0.9.1 run (parameters as in
    RA-SIM-NATIVE-CERT-ROBUST-001). attribution rows produced for all 7 components
    across both modes and both family semantics. In the canonical run, the
    augmented_exact_k semantics carries the signal (baseline_low_high_gap up to
    0.175 for both ledger_failure and orientation_degradation); the at_least_k
    semantics has no signal at the run scale. Top-attributed components are
    sorted by absolute importance score in
    ra_native_overlap_robustness_state_v0_9_1.json. Attribution is diagnostic
    and depends on the current overlap-component definitions; not yet a derived
    RA-native attribution law.'
  next_tasks:
  - Identify which channel(s) (support / frontier / orientation / ledger / causal-past / BDG-kernel-proxy / firewall-proxy) carries the rescue signature most consistently across the canonical run.
  source_status:
    ra_native_overlap_robustness_analysis.py: simulation_validated_canonical_run_confirmed
  legacy_proof_status: DR
  proof_status: simulation_validated_canonical_run_confirmed
  legacy_support_status: none
  auxiliary_support_status: simulation_canonical_run_recorded
  claim_kind: derived_result
  formal_anchor: ra_native_overlap_robustness_analysis.py ; ra_native_overlap_signal_attribution_v0_9_1.csv
  packet_origin: RA_CausalDAG_MotifCommitSimulator_v0_9_1_NativeOverlapRobustness_May05_2026

framing_policies:
- id: RA-SIM-PER-GRAPH-ORIENT-WITNESS-METHOD-001
  name: Per-graph orientation-link witness extraction is operational until tied to concrete native graph witnesses
  domain: framing
  papers:
  - II
  statement: >
    The v1.4 per-graph orientation-link witness extraction uses simulator
    state contexts plus the v1.3 native theorem-catalog tokens to build
    per-family-member witness records keyed by graph instance, motif, site,
    and support-family member. The honesty progression now reads:
    v1.2 surface = hash(row metadata) - demonstrative only;
    v1.3 surface = catalog-derived from RA Lean theorem files - real
    native source involvement, but per-row uniform;
    v1.4 surface = per-graph/per-member keyed witness tokens combining
    catalog declarations with graph-local cut-role indices - per-member
    variation source identified, but extraction is from simulator state
    rather than from concrete RA_GraphCore / ActualizationGraph;
    v1.5+ surface = extraction from concrete graph/cut/orientation
    witness data - the eventual derivation. v1.4 must NOT be treated as
    a Nature-facing orientation-overlap law. Whenever v1.4 outputs are
    cited, the explicit qualifier "per-graph keyed but extracted from
    simulator state, not concrete ActualizationGraph instances" must
    accompany the claim.
  nature_targets:
  - methodological discipline for per-graph orientation-link witness extraction
  - sequencing discipline across v1.2 / v1.3 / v1.4 / v1.5+ progression
  ra_observable: null
  sources:

- id: RA-SIM-PER-GRAPH-ORIENT-WITNESS-001
  name: Per-graph orientation-link witness records can be extracted from simulator state contexts
  domain: complexity
  papers:
  - II
  statement: >
    The v1.4 simulator/analysis layer extracts per-graph/per-support-family-member
    orientation-link witness records from simulator state rows. Each record
    is keyed by graph instance, motif/site, support-family member, and
    carries explicit orientation_link_tokens combining native catalog tokens
    (theorem declaration names from RA_CausalOrientation_Core etc.) and
    graph-local tokens that vary per member (e.g. `orientation-cut-role:0`
    vs `:1`). This is operationally per-graph, but the witnesses are still
    extracted from simulator state - not yet from concrete RA_GraphCore /
    ActualizationGraph instances.
  nature_targets:
  - RA-native orientation-link witness extraction workbench
  - per-graph/per-member token-level witness keying
  ra_observable: per_graph_orientation_link_overlap
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v1_4_PerGraphOrientationWitness_May05_2026
  - ra_per_graph_orientation_witness.py
  - ra_per_graph_orientation_witness_members_v1_4.csv
  - ra_native_orientation_manifest_used_v1_4.csv
  proof_dependencies:
  - RA-SIM-NATIVE-ORIENT-LINK-001
  - RA-MOTIF-PER-GRAPH-ORIENT-WITNESS-001
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-CERT-ROBUST-METHOD-001
  - RA-SIM-NATIVE-CERT-CALIB-METHOD-001
  - RA-SIM-NATIVE-CERT-ANCHOR-METHOD-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-METHOD-001
  - RA-SIM-ORIENTATION-LINK-SURFACE-METHOD-001
  - RA-SIM-NATIVE-ORIENT-LINK-METHOD-001
  - RA-SIM-PER-GRAPH-ORIENT-WITNESS-METHOD-001
  restoration_preconditions: []
  caveats: 'Confirmed by canonical v1.4 run (assistant-side; --input-dir
    ../RA_CausalDAG_MotifCommitSimulator_v0_9_NativeCertificateOverlap_May05_2026/outputs
    --native-manifest-dir
    ../RA_CausalDAG_MotifCommitSimulator_v1_3_NativeOrientationLinkDerivation_May05_2026/outputs
    --native-lean-dir /Users/jsandeman/projects/Relational-Actualism/src/RA_AQFT)
    over 480 v0.9 input rows, producing 4800 member witness rows
    (10 members x 480 rows) and using a 45-row native theorem catalog
    manifest (v1.3 manifest reused). Sample member tokens combine native
    catalog declarations (RA_CausalOrientation_Core::fixed_point_orientation_symmetric,
    RA_CausalOrientation_Core::no_reverse_precedence) with graph-local
    per-member tokens (graph:run_seed:seed:motif:NAME:site:N:orientation-cut-role:0/1
    varies per member, providing the within-family-cell variation that
    matches support/frontier strata require). Implementation note: the
    packet test file hardcoded /mnt/data/... paths from the packet
    author`s environment; replaced with Path(__file__).resolve().parents[2]
    relative path so the test runs in this repo. Test file installed SHA
    therefore differs from packet original. The witness extraction is
    operational: it is per-graph/per-member keyed but uses simulator state
    rows + native catalog tokens, NOT extraction from concrete RA_GraphCore /
    ActualizationGraph instances. v1.5+ should replace simulator-state
    extraction with concrete graph-side extraction.'
  next_tasks:
  - Replace simulator-state extraction with concrete RA_GraphCore / ActualizationGraph orientation-link witness extraction in v1.5 (or later); validate that the per-member orientation tokens carry through the graph bridge.

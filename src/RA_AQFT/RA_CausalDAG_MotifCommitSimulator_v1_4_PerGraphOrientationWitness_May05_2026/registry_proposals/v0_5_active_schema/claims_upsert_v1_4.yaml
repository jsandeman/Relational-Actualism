  - RA-SIM-NATIVE-CERT-CALIB-METHOD-001
  - RA-SIM-NATIVE-CERT-ANCHOR-METHOD-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-METHOD-001
  - RA-SIM-ORIENTATION-LINK-SURFACE-METHOD-001
  - RA-SIM-NATIVE-ORIENT-LINK-METHOD-001
  - RA-SIM-PER-GRAPH-ORIENT-WITNESS-METHOD-001
  restoration_preconditions: []
  caveats: 'Lake-build-confirmed (assistant-side `lake build RA_MotifPerGraphOrientationWitness` closed with 8286/8286 jobs, ~72s; no sorry/admit/axiom). The module imports only RA_MotifNativeOrientationLinkDerivation and adds DAGPerGraphOrientationWitnessContext / GraphPerGraphOrientationWitnessContext (with abstract `graphInstance`, `memberIndex`, `perGraphOrientationEvidence` fields plus a `refinesNativeCatalog` morphism into the v1.3 native catalog evidence), DAGHasPerGraphOrientationWitness / GraphHasPerGraphOrientationWitness predicates, refinement theorems .to_native_catalog and .to_orientation_link_surface (DAG + Graph parallel pair), plus qualitative DAGPerGraphOrientationWitnessProfile / GraphPerGraphOrientationWitnessProfile structures. Three fixes were required vs packet original: (1) DAGNativeCertificateComponentContext G Γ M F Ξ Ω -> DAGNativeCertificateComponentContext Ω (recurring v1.x parameter-passing fix; CLAUDE.md item 7); (2) GraphNativeCertificateComponentContext G Γ M F Ξ Ω -> ... Ω (same fix for Graph variant); (3) NEW VARIANT - the packet author used `Π` (capital pi) as the parameter name for the per-graph witness context binding, but `Π` is reserved by Lean 4 for the dependent-product / `Pi` binder and produced "unexpected token" errors at every use. Renamed `Π -> P` across the file (same family as the `Σ -> S` rename in CLAUDE.md item 1). Installed SHA differs from packet original; documented in artifacts.csv notes. The bridge is qualitative; it adds per-graph witness-refinement structure but asserts no numerical orientation-rescue law or probability.'
  next_tasks:
  - Replace the abstract perGraphOrientationEvidence with concrete native graph/cut/orientation witness data extracted from RA_GraphCore / RA_CausalOrientation_Core / RA_D1_NativeLedgerOrientation rather than treating it as opaque Type-valued evidence indexed by abstract graphInstance / memberIndex.

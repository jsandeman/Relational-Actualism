- id: RA-SIM-PER-GRAPH-ORIENT-WITNESS-002
  name: Per-graph orientation-link witness overlap separates orientation diagnostics from support-frontier overlap
  domain: complexity
  papers:
  - II
  statement: >
    In the canonical v1.4 extraction, per-graph orientation-link overlap is
    decoupled from support, frontier, AND legacy orientation overlap (max_abs_diff
    ~0.81 across all three comparisons; legacy orientation_overlap remains
    confounded with support/frontier as expected from unchanged v0.9 input).
    Orientation-degradation diagnostics show per-graph orientation-specific
    sensitivity under matched support/frontier strata, while ledger_failure
    and selector_stress remain controls (not resolved by orientation overlap).
    This demonstrates that the v1.1 audit machinery, when given a per-graph/
    per-member witness surface, distinguishes orientation-channel resilience
    from ledger/cert-exposure resilience even with reduced bin coverage
    (low_minus_medium gap of +0.039-0.041 vs v1.3`s low_minus_high +0.124-0.147,
    reflecting the finer-grained per-member sampling).
  nature_targets:
  - orientation-specific certification diagnostics under matched support/frontier controls
  - per-graph member-level resilience signature
  ra_observable: per_graph_orientation_specificity
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v1_4_PerGraphOrientationWitness_May05_2026
  - ra_per_graph_orientation_link_overlap_v1_4.csv
  - ra_per_graph_orientation_specificity_v1_4.csv
  - ra_per_graph_orientation_partial_correlation_v1_4.csv
  - ra_per_graph_orientation_matched_strata_v1_4.csv
  - ra_per_graph_orientation_support_decoupling_audit_v1_4.csv
  proof_dependencies:
  - RA-SIM-PER-GRAPH-ORIENT-WITNESS-001
  - RA-SIM-NATIVE-ORIENT-LINK-002
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-CERT-CALIB-METHOD-001
  - RA-SIM-NATIVE-CERT-ANCHOR-METHOD-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-METHOD-001
  - RA-SIM-ORIENTATION-LINK-SURFACE-METHOD-001
  - RA-SIM-NATIVE-ORIENT-LINK-METHOD-001
  - RA-SIM-PER-GRAPH-ORIENT-WITNESS-METHOD-001
  restoration_preconditions: []
  caveats: 'Confirmed by canonical v1.4 run (parameters as in
    RA-SIM-PER-GRAPH-ORIENT-WITNESS-001).
    per_graph_orientation_surface_decoupled=true (decoupling audit:
    per_graph orientation vs support_overlap max_abs_diff 0.818
    [ledger_failure] / 0.814 [orientation_degradation] / 0.823
    [selector_stress]; per_graph orientation vs frontier_overlap and vs
    legacy_orientation_overlap show identical max_abs_diff per mode;
    legacy_orientation vs support_frontier remains confounded at 0.0
    across all modes). matched_orientation_variation_available=true.
    orientation_specificity_resolved=true:
    orientation_degradation / at_least_k -> per_graph_orientation_specific_surface_detected
    (low_minus_medium rescue gap +0.039);
    orientation_degradation / augmented_exact_k -> per_graph_orientation_specific_surface_detected
    (low_minus_medium rescue gap +0.041);
    ledger_failure / both semantics -> ledger_control_not_resolved_by_orientation
    (rescue gap +0.014 / +0.014; correctly attributed to ledger not
    orientation channel); selector_stress / both -> not_certification_channel.
    mean_per_graph_orientation_residual_std=0.0822 (independent variation
    after support/frontier OLS control); mean_legacy_orientation_residual_std=5.5e-17
    (still confounded as expected). selector_guardrail_passed=true. The
    per-graph specificity gap is smaller than v1.3`s catalog-only gap
    because v1.4 splits each row into 10 member witnesses, increasing
    sample resolution but reducing per-cell signal magnitude. Per-member
    orientation tokens vary across siblings via graph-local cut-role
    indices, providing the within-stratum variation source. Diagnostic
    remains operational - v1.4 is per-graph keyed but not yet a final
    derivation from concrete ActualizationGraph instances.'
  next_tasks:
  - Validate that per-graph orientation-specificity persists when witnesses are extracted from concrete RA_GraphCore / ActualizationGraph instances (v1.5+).

claims:
- id: RA-MOTIF-PER-GRAPH-ORIENT-WITNESS-001
  name: Per-graph orientation-link witness evidence refines native orientation catalog evidence
  domain: matter
  papers:
  - II
  statement: >
    A per-graph/member orientation-link witness surface can be packaged as
    Type-valued evidence indexed by an abstract graph instance and a
    support-family member index, refining the v1.3 native orientation-catalog
    evidence and therefore the v1.2 abstract orientation-link surface and
    the v1.0 generic orientation component. Both DAG and Graph layers admit
    the same per-graph witness structure.
  nature_targets:
  - RA-native orientation-link witness structure for support-family members
  - per-graph indexing of orientation evidence
  ra_observable: null
  sources:
  - RA_MotifPerGraphOrientationWitness.lean
  proof_dependencies:
  - RA-MOTIF-NATIVE-ORIENT-LINK-001
  - RA-MOTIF-ORIENTATION-LINK-SURFACE-001
  - RA-MOTIF-NATIVE-CERT-COMPONENTS-001
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-MOTIF-COMMIT-METHOD-001
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001

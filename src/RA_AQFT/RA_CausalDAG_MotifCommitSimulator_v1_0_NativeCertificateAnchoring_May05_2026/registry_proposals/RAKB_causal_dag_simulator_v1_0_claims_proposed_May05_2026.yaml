  proof_dependencies:
    - RA-MOTIF-CERT-FAMILY-001
    - RA-MOTIF-NATIVE-CERT-OVERLAP-001
  restoration_preconditions: []
  caveats: >
    This is a qualitative formal bridge. It does not derive a numerical overlap
    law or certification-rescue probability from BDG-LLC.

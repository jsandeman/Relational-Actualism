  name: Native certificate components package support-family witness surfaces
  domain: kernel
  papers: [I, II]
  statement: >
    Native certificate witnesses for support-cut families can be decomposed into
    support, frontier, orientation, ledger, causal-past, kernel-local, and
    firewall/severance-exposure component surfaces, and such component witnesses
    package into the native-overlap certified-family readiness layer.
  nature_targets:
    - component-resolved actualization support certificates
    - native certificate-witness distinctness

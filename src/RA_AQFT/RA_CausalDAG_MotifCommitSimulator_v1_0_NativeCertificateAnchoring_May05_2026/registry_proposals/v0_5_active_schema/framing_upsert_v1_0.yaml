framing_policies:
- id: RA-SIM-NATIVE-CERT-ANCHOR-METHOD-001
  name: Native certificate anchoring is component-level and qualitative until BDG-LLC derivation
  domain: framing
  papers:
  - II
    The v1.0 native-certificate anchoring layer records component-level overlap
    surfaces, family-semantics signal-carrier posture, and qualitative-only
    calibration to the external certificate-correlation scale. The v1.0 result
    is a component-anchored proxy ready for the next refinement steps - it is
    NOT a fully decomposed native component law. It must not be interpreted as
    a final BDG-LLC-derived probability law, as an exact calibration of
    native-overlap bins to external certificate-correlation values, or as an
    assertion that augmented_exact_k is the unique physically correct
    support-family semantics. Component-attribution interpretations must respect
    the v0.9 component-layer's joint support/frontier/orientation triplet -
    orientation-channel specificity is not separated from the triplet at v0.9,
    and v1.0 records this faithfully rather than papering over the collapse.
    Sequencing discipline - v1.1 must decouple orientation overlap from the
    support/frontier/orientation triplet via matched-strata diagnostics BEFORE
    BDG-LLC formal anchoring; otherwise the formal layer would anchor a
    confounded proxy.
  nature_targets:
  - modeling discipline for native certificate component anchoring
  ra_observable: null
  sources:

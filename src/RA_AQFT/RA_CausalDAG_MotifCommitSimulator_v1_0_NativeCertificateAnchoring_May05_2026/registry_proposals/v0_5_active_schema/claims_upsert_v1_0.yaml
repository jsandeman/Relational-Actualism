  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-CERT-ROBUST-METHOD-001
  - RA-SIM-NATIVE-CERT-CALIB-METHOD-001
  - RA-SIM-NATIVE-CERT-ANCHOR-METHOD-001
  restoration_preconditions: []
  caveats: 'Confirmed by canonical v1.0 run (parameters as in
    RA-SIM-NATIVE-CERT-ANCHOR-001). calibration_rows=4 (one per mode x
    family_semantics cell), all 4 carry qualitative_alignment=True and
    v1_posture=qualitative_alignment_not_absolute_calibration. Inherited from
    v0.9.2 mapping: native AUC proxies (0.079-0.105) exceed external AUCs
    (0.044-0.049); native rescue decays (0.157-0.218) exceed external decays

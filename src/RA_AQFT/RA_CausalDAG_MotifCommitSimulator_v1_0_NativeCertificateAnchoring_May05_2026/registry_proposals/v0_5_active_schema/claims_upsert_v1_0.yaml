  - II
  statement: >
    The v1.0 anchoring layer treats native-overlap bins (low/medium/high) as
    qualitative structural bins of witness overlap, aligned with but not
    numerically identical to the external certificate-correlation scale used
    in v0.8.1. All recorded calibration entries carry an explicit
    qualitative_alignment_not_absolute_calibration posture.
  nature_targets:
  - native witness-overlap calibration discipline
  - epistemic separation of structural bins from external correlation values
  ra_observable: native_overlap_calibration_status
  sources:

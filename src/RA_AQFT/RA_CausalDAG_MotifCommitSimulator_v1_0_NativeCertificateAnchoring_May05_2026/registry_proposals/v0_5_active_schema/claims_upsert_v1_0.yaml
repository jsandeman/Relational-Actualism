  domain: complexity
  papers:
  - II
  statement: >
    The v1.0 anchoring layer records the resolved v0.9.2 posture: augmented_exact_k
    is the primary native-overlap signal-carrier semantics (full low/medium/high
    bin coverage, strong rescue-gap signal) and at_least_k is retained as a
    monotone broader-inclusion guardrail semantics (medium/high coverage, monotone
    medium-to-high decay). Both semantics are recorded as informative; neither is
    asserted as uniquely physically correct.

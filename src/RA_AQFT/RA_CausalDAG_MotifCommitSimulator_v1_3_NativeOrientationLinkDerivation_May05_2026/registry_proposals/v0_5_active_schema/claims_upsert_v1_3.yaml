  name: Native orientation catalog evidence refines orientation-link surface
  domain: matter
  papers:
  - II
  statement: >
    A native orientation-catalog evidence layer (with documentary obligations
    referencing RA_CausalOrientation_Core, RA_D1_NativeLedgerOrientation, and
    RA_D1_NativeClosure) packages as Type-valued evidence that refines the
    v1.2 distinct orientation-link surface and therefore refines the generic
    orientation component evidence already present in the v1.0 native
    certificate component bridge. Both DAG and Graph layers admit the same
    catalog refinement structure.
  nature_targets:
  - RA-native orientation-link certification evidence
  - native motif actualization support certification
  ra_observable: null
  sources:
  - RA_MotifNativeOrientationLinkDerivation.lean
  proof_dependencies:

  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-METHOD-001
  - RA-SIM-ORIENTATION-LINK-SURFACE-METHOD-001
  - RA-SIM-NATIVE-ORIENT-LINK-METHOD-001
  restoration_preconditions: []
  caveats: 'Lake-build-confirmed (assistant-side `lake build RA_MotifNativeOrientationLinkDerivation` closed with 8278/8278 jobs, ~65s; no sorry/admit/axiom). The module imports only RA_MotifOrientationLinkSurface and adds DAGNativeOrientationLinkCatalogContext / GraphNativeOrientationLinkCatalogContext (Type-valued nativeOrientationEvidence + nativeEvidenceRefinesLink morphism into the v1.2 orientation-link surface), DAGHasNativeOrientationLinkCatalog / GraphHasNativeOrientationLinkCatalog predicates, refinement theorems .to_orientation_link_surface and .to_orientation_component (DAG + Graph parallel pair), and qualitative DAGNativeOrientationCatalogOverlapProfile / GraphNativeOrientationCatalogOverlapProfile structures. Three fixes were required vs packet original: (1) orientationEvidence -> orientationComponent (same field-name mismatch with v1.0 module as v1.2 had); (2) DAGNativeCertificateComponentContext G Γ M F Ξ Ω -> DAGNativeCertificateComponentContext Ω (only Ω is explicit in v1.0; same parameter-passing fix as v1.2); (3) NEW - dropped imports of RA_CausalOrientation_Core, RA_D1_NativeLedgerOrientation, RA_D1_NativeClosure due to a transitive `chainScore` duplicate-definition conflict (RA_D1_Core defines chainScore at line 80 and RA_D1_NativeKernel defines chainScore at line 32; the two transitive import chains together fail with "environment already contains chainScore.match_1"). Dropping the imports preserves semantics because the `usesCausalOrientationCore`, `usesNativeLedgerOrientation`, `usesNativeClosure` fields are pure Prop placeholders that do not depend on the imported modules` content - they are documentary obligations for downstream instantiations. The chainScore conflict is an upstream repo-level issue worth flagging in CLAUDE.md as a known recurring import hazard. Installed SHA differs from packet original; documented in artifacts.csv notes. The bridge is qualitative - it adds catalog-witness refinement structure but asserts no numerical orientation-rescue law or probability.'
  next_tasks:
  - Constrain the abstract nativeOrientationEvidence with concrete native orientation-link / sign-source structures sourced per-graph from RA_CausalOrientation_Core / RA_D1_NativeLedgerOrientation / RA_D1_NativeClosure once the chainScore upstream conflict is resolved (rename or namespace one of the duplicate definitions).
  - Resolve the chainScore duplicate definition between RA_D1_Core and RA_D1_NativeKernel so downstream native modules can import the full native catalog without conflict.
  source_status:

- id: RA-SIM-NATIVE-ORIENT-LINK-002
  name: Native catalog orientation surface supports orientation-specific diagnostics after support/frontier control
  domain: complexity
  papers:
  - II
  statement: >
    The v1.3 canonical analysis finds independent native orientation-link
    variation after support/frontier OLS control and detects
    orientation-degradation specificity using the native theorem-catalog
    surface. This demonstrates that the v1.1 audit machinery, when given a
    catalog-derived (not row-hash-synthesized) orientation surface, still
    correctly distinguishes orientation-channel resilience from
    ledger/cert-exposure resilience.
  nature_targets:
  - orientation-channel certification resilience
  - component-specific actualization fragility diagnostics
  ra_observable: native_orientation_specificity
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v1_3_NativeOrientationLinkDerivation_May05_2026
  - ra_native_orientation_specificity_after_support_control_v1_3.csv
  - ra_native_orientation_partial_correlation_v1_3.csv
  - ra_native_orientation_derivation_summary_v1_3.md
  proof_dependencies:
  - RA-SIM-NATIVE-ORIENT-LINK-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-002
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-CERT-CALIB-METHOD-001
  - RA-SIM-NATIVE-CERT-ANCHOR-METHOD-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-METHOD-001
  - RA-SIM-ORIENTATION-LINK-SURFACE-METHOD-001
  - RA-SIM-NATIVE-ORIENT-LINK-METHOD-001
  restoration_preconditions: []
  caveats: 'Confirmed by canonical v1.3 run (parameters as in
    RA-SIM-NATIVE-ORIENT-LINK-001).
    native_orientation_residual_std=0.174 (independent variation after
    support/frontier control); legacy_orientation_residual_std=1.2e-15
    (still confounded as expected from unchanged v1.0 input);
    selector_guardrail_passed=true; orientation_specificity_resolved=true.
    Per-mode/semantics specificity:
    orientation_degradation / at_least_k -> native_orientation_specific_surface_detected
    (rescue gap +0.124, native sensitivity 0.515 vs ledger 0.022);
    orientation_degradation / augmented_exact_k -> native_orientation_specific_surface_detected
    (rescue gap +0.147, native sensitivity 0.507 vs ledger 0.024);
    ledger_failure / both semantics -> ledger_control_not_resolved (correct;
    native orientation-link does not drive ledger rescue);
    selector_stress / both semantics -> not_certification_channel.
    The v1.1 audit machinery gives the same orientation-specificity verdict
    on the catalog-derived surface that it did on the v1.2 row-hash surface,
    confirming the audit infrastructure is robust to the underlying surface
    construction. Diagnostic remains catalog-level; not yet a final native
    orientation-overlap law.'
  next_tasks:
  - Run v1.3 audits against per-graph native orientation-link witness extraction in v1.4 to complete the catalog -> per-graph progression.

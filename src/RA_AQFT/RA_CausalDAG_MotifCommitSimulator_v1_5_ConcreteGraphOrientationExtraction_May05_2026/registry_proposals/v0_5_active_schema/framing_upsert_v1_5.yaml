  caveats: 'Reference-corpus extraction is a real advance over v1.4 (per-member token-based extraction from simulator state) because witnesses now come from genuine graph topology, but the corpus is parallel-Python, not v0.9-derived. Operational extraction and topology-derived identifiability diagnostics are NOT Nature-facing predictions. Do not promote any orientation-specific Nature claim until v1.6 (or later) ties the extractor to v0.9 simulator graphs. The family-semantics asymmetry first identified in v0.9.2 (augmented_exact_k carries the signal; at_least_k weak_or_tied) is preserved in v1.5 - this is consistent across all surface generations and provides cross-validation of that finding.'
  next_tasks:

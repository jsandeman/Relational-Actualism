  - RA-METHOD-002
  - RA-MOTIF-COMMIT-METHOD-001
  - RA-SIM-NATIVE-CERT-OVERLAP-METHOD-001
  - RA-SIM-NATIVE-CERT-ROBUST-METHOD-001
  - RA-SIM-NATIVE-CERT-CALIB-METHOD-001
  - RA-SIM-NATIVE-CERT-ANCHOR-METHOD-001
  - RA-SIM-NATIVE-COMPONENT-DECOUPLE-METHOD-001
  - RA-SIM-ORIENTATION-LINK-SURFACE-METHOD-001
  - RA-SIM-NATIVE-ORIENT-LINK-METHOD-001
  - RA-SIM-PER-GRAPH-ORIENT-WITNESS-METHOD-001
  - RA-SIM-CONCRETE-GRAPH-ORIENT-METHOD-001
  restoration_preconditions: []
  caveats: 'Lake-build-confirmed (assistant-side `lake build RA_MotifConcreteGraphOrientationWitness` closed with 8287/8287 jobs, ~70s; no sorry/admit/axiom). The module imports only RA_MotifPerGraphOrientationWitness and adds DAGConcreteEdgePairSignContext / GraphConcreteEdgePairSignContext (Type-valued concreteEdgePairSignEvidence + concreteRefinesPerGraph morphism into the v1.4 per-graph evidence), DAGHasConcreteEdgePairSignWitness / GraphHasConcreteEdgePairSignWitness predicates, refinement theorems .to_per_graph (DAG + Graph parallel pair) plus the composed .to_native_catalog and .to_orientation_link_surface theorems for the DAG layer, and qualitative DAGConcreteEdgePairSignOverlapProfile / GraphConcreteEdgePairSignOverlapProfile structures with `topologyDerived` and `refinesPerGraphOverlap` Prop fields. The bridge is qualitative; it does not assert any numerical orientation-rescue law, probability, or BDG-LLC derivation. This is the first author-built (vs packet-installed) module in the orientation-link line; it built clean on the first try after the previous v1.0/v1.2/v1.3/v1.4 patterns were applied correctly (orientationComponent vs orientationEvidence, only-Ω-explicit, no Π identifiers).'
  next_tasks:

claims:
- id: RA-MOTIF-CONCRETE-GRAPH-ORIENT-WITNESS-001
  name: Concrete edge-pair-sign witness evidence refines per-graph orientation-link evidence
  domain: matter
  papers:
  - II
  statement: >
    A concrete edge-pair-sign witness surface (witness data of the form
    (parent, child, sign, member-index) drawn from actual graph topology)
    can be packaged as Type-valued evidence that instantiates the v1.4
    abstract per-graph orientation-link witness type, and therefore refines
    the v1.3 native catalog evidence, the v1.2 abstract orientation-link
    surface, and the v1.0 generic orientation component, through a chain of
    refinement morphisms. Both DAG and Graph layers admit the same concrete
    instantiation structure.
  nature_targets:
  - RA-native concrete edge-pair-sign witness structure for support-family members
  - topology-derived orientation evidence
  ra_observable: null
  sources:
  - RA_MotifConcreteGraphOrientationWitness.lean
  proof_dependencies:
  - RA-MOTIF-PER-GRAPH-ORIENT-WITNESS-001
  - RA-MOTIF-NATIVE-ORIENT-LINK-001
  - RA-MOTIF-ORIENTATION-LINK-SURFACE-001
  - RA-MOTIF-NATIVE-CERT-COMPONENTS-001
  framing_links:

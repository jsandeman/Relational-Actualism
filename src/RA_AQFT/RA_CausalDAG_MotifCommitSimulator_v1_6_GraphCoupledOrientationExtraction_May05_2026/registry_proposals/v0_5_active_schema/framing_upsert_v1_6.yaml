# v0.5 active-schema upsert for v1.6 framing.

framing_policies:
- id: RA-SIM-GRAPH-COUPLED-ORIENT-METHOD-001
  name: v1.6 graph-coupled extraction is the methodological gold standard for orientation-rescue claims; v1.6 results retract the v1.5 cross-validation of v0.9.2 family-semantics asymmetry
  domain: framing
  papers:
  - II
  statement: >
    The v1.6 graph-coupled orientation-link extraction is the methodological
    gold standard for any topology-causal orientation-rescue claim, because
    rescue and orientation overlap are extracted from the SAME v0.9
    CausalDAG instance per trial. The honesty progression now reads:
    v1.2 hash(row metadata) -> v1.3 catalog tokens -> v1.4 simulator-state
    tokens -> v1.5 concrete-topology corpus (still hash-keyed to v0.9
    rescue) -> v1.6 graph-coupled (no hash key, same DAG per trial).

    EMPIRICAL UPDATE FROM v1.6: the v1.5 orientation-specificity result
    does NOT replicate when the rescue/topology disconnection is closed.
    Both orientation_degradation cells show reversed-sign rescue gaps
    (-0.146 / -0.229) at v1.6's sample size. The v1.5 claim of "cross-
    validating the v0.9.2 family-semantics asymmetry" is RETRACTED -
    that cross-validation depended on the hash-keyed mapping that v1.6
    eliminated. Whether v1.6's reversed-sign verdict is small-sample
    noise, a robust finding in the opposite direction, or whether
    positive specificity emerges at canonical sample size, remains an
    open question for v1.7+.

    DISCIPLINE - any future orientation-link rescue claim must be
    measured on matched graphs (rescue and orientation overlap from the
    same CausalDAG per trial). Hash-keyed or independent-corpus
    extractions are audit-machinery validation only and must not be
    cited as topology-causal evidence. The v0.9.2 family-semantics
    asymmetry remains a v0.9-internal finding; the v1.x orientation-link
    program does NOT independently cross-validate it.
  nature_targets:
  - methodological standard for graph-coupled orientation-rescue measurement
  - retraction discipline for hash-keyed cross-validation claims
  - sequencing across v1.2-v1.6 progression
  ra_observable: null
  sources:

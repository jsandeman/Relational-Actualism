# v0.5 active-schema proposal for corrected v1.6 framing.
framing_policies:
- id: RA-SIM-GRAPH-COUPLED-ORIENT-METHOD-001
  name: Graph-coupled extraction is required for topology-causal orientation-rescue claims
  domain: framing
  papers: [II]
  statement: >
    Any future topology-causal orientation-rescue claim must measure rescue and
    orientation-link overlap on the same CausalDAG instance per trial. The v1.6
    matched-graph diagnostic closes the v1.5 rescue/topology disconnection and
    supersedes hash-keyed or independent-corpus orientation-overlap comparisons
    as evidence for topology-causal claims. v1.6 is a methodological correction
    and subset diagnostic; it retracts the use of v1.5 as independent
    cross-validation of v0.9.2, but does not establish a robust reversed
    orientation-specificity law.
  nature_targets:
  - methodological standard for graph-coupled orientation-rescue measurement
  - retraction discipline for hash-keyed cross-validation claims
  ra_observable: null
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v1_6_GraphCoupledOrientationExtraction_May05_2026
  - README_RA_CausalDAG_MotifCommitSimulator_v1_6_GraphCoupledOrientationExtraction_May05_2026.md
  - RA_CausalDAG_MotifCommitSimulator_v1_6_GraphCoupledOrientationExtraction_Report_May05_2026.md
  proof_dependencies: []
  framing_links:
  - RA-METHOD-001
  - RA-METHOD-002
  restoration_preconditions: []
  caveats: >
    v1.6 included outputs are a 192-trial subset matched-graph diagnostic.
    They should not be cited as canonical-scale orientation specificity or
    Nature-facing evidence. The packet corrects its original mean-pairwise
    overlap description and partial-correlation narrative; installed/committed
    SHAs should be recorded after local edits.
  next_tasks:
  - v1.7 should scale matched extraction and compare all-pairs with parent-anchored overlap diagnostics.

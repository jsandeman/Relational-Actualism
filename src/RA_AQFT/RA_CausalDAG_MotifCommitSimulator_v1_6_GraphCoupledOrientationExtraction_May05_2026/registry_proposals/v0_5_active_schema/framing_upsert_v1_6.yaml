  caveats: 'v1.6 is the first packet in the orientation-link program where rescue and orientation_overlap are measured on matched DAG instances - this is the methodological achievement. The empirical finding (reversed-sign specificity for orientation_degradation) is small-sample (192 trials, 24 per-cell rows) and may reflect noise rather than a robust topology-causal signal in either direction. Two cautions apply downstream. (a) Do NOT promote v1.6 reversal as a positive Nature-facing finding without v1.7+ canonical-scale replication. (b) Do NOT promote any orientation-specific rescue claim that is based on the v1.2-v1.5 hash-keyed extractions; those have been superseded by the v1.6 matched extraction and the v1.5 cross-validation claim is retracted. The v0.9.2 family-semantics asymmetry remains a v0.9-internal finding; it has NOT been independently confirmed by v1.x.'
  next_tasks:

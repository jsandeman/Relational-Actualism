# v0.5 active-schema proposal for corrected v1.6 graph-coupled orientation-link extraction.
# Translate manually into active RAKB v0.5 schema; do not run as an auto-apply script.

claims:
- id: RA-SIM-GRAPH-COUPLED-ORIENT-001
  name: v1.6 closes the v1.5 rescue/topology disconnection by extracting orientation overlap on the same v0.9 CausalDAG instance per trial
  domain: complexity
  papers: [II]
  statement: >
    The corrected v1.6 simulator/analysis layer imports the v0.9 simulator and
    replays a constrained matched-graph subset. For each v0.9 trial it calls
    evaluate_native_overlap_certified_family on a real ChannelSeedState to
    obtain certification_rescue_event and native-overlap fields, then computes
    graph-coupled orientation-link overlap on the SAME state.dag over the same
    support-family cuts. The primary overlap statistic is all-pairs mean Jaccard
    across family-member edge-pair-sign witnesses; parent-anchored mean Jaccard
    is retained as a secondary diagnostic. The v1.5 rescue/topology
    disconnection is thereby eliminated for the tested subset.
  nature_targets:
  - methodological standard for graph-coupled orientation-rescue measurement
  - elimination of the v1.5 rescue/topology disconnection for matched-graph subset trials
  ra_observable: graph_coupled_orientation_link_overlap
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v1_6_GraphCoupledOrientationExtraction_May05_2026
  - ra_graph_coupled_orientation_extraction.py
  - ra_v1_6_trial_rows.csv
  - ra_v1_6_per_cell_aggregated.csv
  - ra_v1_6_decoupling_audit.csv
  proof_dependencies:
  - RA-SIM-CONCRETE-GRAPH-ORIENT-001
  - RA-SIM-PER-GRAPH-ORIENT-WITNESS-001
  - RA-MOTIF-CONCRETE-GRAPH-ORIENT-WITNESS-001
  - RA-SIM-NATIVE-CERT-OVERLAP-001
  restoration_preconditions: []
  caveats: >
    This is a subset matched-graph diagnostic run, not a canonical 100-seed/full-sweep
    result. Included outputs use 4 growth seeds, 1 severance seed, 3 modes, one
    severity (0.5), one threshold (0.5), two family semantics, max_targets=8,
    producing 192 trials and 24 per-cell rows. The orientation keying is one
    edge-pair-sign construction. Results should be used as methodological
    correction/provenance, not as a Nature-facing orientation-rescue claim.
  next_tasks:
  - Scale matched-graph extraction to canonical coverage in v1.7.
  source_status:
    ra_graph_coupled_orientation_extraction.py: simulation_validated_matched_subset_run
  legacy_proof_status: DR
  proof_status: simulation_validated_matched_subset_run
  legacy_support_status: none
  auxiliary_support_status: simulation_matched_subset_recorded
  claim_kind: derived_result
  formal_anchor: ra_graph_coupled_orientation_extraction.py ; ra_v1_6_trial_rows.csv ; ra_v1_6_per_cell_aggregated.csv ; ra_v1_6_decoupling_audit.csv
  packet_origin: RA_CausalDAG_MotifCommitSimulator_v1_6_GraphCoupledOrientationExtraction_May05_2026

- id: RA-SIM-GRAPH-COUPLED-ORIENT-002
  name: v1.6 matched-graph subset does not replicate the v1.5 orientation-specificity verdict
  domain: complexity
  papers: [II]
  statement: >
    In the corrected v1.6 matched-graph subset, the v1.5 orientation-specificity
    result does not replicate. The specificity audit gives reversed_or_negative
    verdicts for orientation_degradation under both at_least_k and
    augmented_exact_k semantics, while selector_stress remains not_certification_channel
    and ledger_failure remains a ledger control. This retracts the earlier use
    of v1.5 as independent cross-validation of the v0.9.2 family-semantics
    asymmetry. The reversed signs themselves are not promoted as robust because
    each specificity cell has only four per-cell rows.
  nature_targets:
  - matched-graph audit of orientation-specificity claims
  - correction of v1.5 cross-validation interpretation
  ra_observable: graph_coupled_orientation_specificity
  sources:
  - RA_CausalDAG_MotifCommitSimulator_v1_6_GraphCoupledOrientationExtraction_May05_2026
  - ra_v1_6_specificity.csv
  - ra_v1_6_partial_correlation.csv
  proof_dependencies:
  - RA-SIM-GRAPH-COUPLED-ORIENT-001
  - RA-SIM-CONCRETE-GRAPH-ORIENT-002
  restoration_preconditions: []
  caveats: >
    Subset specificity gaps are -0.146 and -0.229 for orientation_degradation,
    but these are small-sample diagnostics, not robust reverse-orientation
    findings. The corrected partial-correlation table has nonzero rescue
    residual variance for ledger/orientation cells; the earlier statement that
    support/frontier explain all rescue variation across all six cells was
    incorrect and applied only to selector-stress controls. Canonical v1.7
    coverage is required before any positive or reversed orientation-specificity
    claim is made.
  next_tasks:
  - Run v1.7 at canonical matched-graph coverage.
  - Compare all-pairs and parent-anchored Jaccard diagnostics.
  - Test alternate topological orientation keyings on matched graphs.
  source_status:
    ra_graph_coupled_orientation_extraction.py: simulation_validated_matched_subset_run
  legacy_proof_status: DR
  proof_status: simulation_validated_matched_subset_run
  legacy_support_status: none
  auxiliary_support_status: simulation_matched_subset_recorded
  claim_kind: derived_result
  formal_anchor: ra_v1_6_specificity.csv ; ra_v1_6_partial_correlation.csv
  packet_origin: RA_CausalDAG_MotifCommitSimulator_v1_6_GraphCoupledOrientationExtraction_May05_2026

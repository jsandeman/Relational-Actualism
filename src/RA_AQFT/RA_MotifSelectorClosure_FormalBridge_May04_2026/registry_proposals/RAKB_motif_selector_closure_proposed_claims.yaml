# Proposed RAKB claim/framing entries for RA_MotifSelectorClosure.
# Status should remain source_level_formal_bridge_draft until local Lean compile is confirmed.

- id: RA-MOTIF-SELECTOR-001
  name: Certified readiness combines support certification and causal readiness
  domain: motif_actualization
  statement: >
    Certified readiness at a causal site is the conjunction of commit-context
    support certification and support-cut readiness at that site.
  formal_anchor: RA_MotifSelectorClosure: DAGCertifiedReadyAt; GraphCertifiedReadyAt
  proof_status: source_level_formal_bridge_draft
  dependencies:
    - RA-MOTIF-COMMIT-003
    - RA-MOTIF-COMMIT-007
  methodological_guardrails:
    - RA-METHOD-001
    - RA-METHOD-002
    - RA-MOTIF-COMMIT-METHOD-001

- id: RA-MOTIF-SELECTOR-002
  name: Selector closure selects only certified-ready motif/support-cut pairs
  domain: motif_actualization
  statement: >
    A selector closure at a causal site selects motif/support-cut pairs only
    when those pairs are certified-ready at that site, and selected pairs must
    be pairwise compatible under the local RA incompatibility relation.
  formal_anchor: >
    RA_MotifSelectorClosure: DAGSelectorClosureAt; GraphSelectorClosureAt;
    DAGSelectedCommitsAt.of_selected; GraphSelectedCommitsAt.of_selected
  proof_status: source_level_formal_bridge_draft
  dependencies:
    - RA-MOTIF-SELECTOR-001
    - RA-MOTIF-COMMIT-008
  methodological_guardrails:
    - RA-METHOD-001
    - RA-METHOD-002
    - RA-MOTIF-COMMIT-METHOD-001

- id: RA-MOTIF-SELECTOR-003
  name: Selected commitment is distinct from strict commitment
  domain: motif_actualization
  statement: >
    Selected commitment requires certified readiness and selection by a local
    selector closure. Strict commitment further requires exclusion of all
    certified-ready incompatible alternatives at the same causal site.
  formal_anchor: >
    RA_MotifSelectorClosure: DAGSelectedCommitsAt; GraphSelectedCommitsAt;
    DAGSelectedCommitsAt.to_strict_commits_of_complete;
    GraphSelectedCommitsAt.to_strict_commits_of_complete
  proof_status: source_level_formal_bridge_draft
  dependencies:
    - RA-MOTIF-SELECTOR-002
    - RA-MOTIF-COMMIT-008
  methodological_guardrails:
    - RA-METHOD-001
    - RA-MOTIF-COMMIT-METHOD-001

- id: RA-MOTIF-SELECTOR-004
  name: Complete selector closure recovers strict motif commitment
  domain: motif_actualization
  statement: >
    If selector closure is complete over certified-ready alternatives at a site,
    then selected commitment implies the strict motif-commit predicate.
  formal_anchor: >
    RA_MotifSelectorClosure:
    DAGSelectedCommitsAt.to_strict_commits_of_complete;
    GraphSelectedCommitsAt.to_strict_commits_of_complete
  proof_status: source_level_formal_bridge_draft
  dependencies:
    - RA-MOTIF-SELECTOR-002
    - RA-MOTIF-COMMIT-008
  methodological_guardrails:
    - RA-METHOD-001
    - RA-MOTIF-COMMIT-METHOD-001

- id: RA-MOTIF-SELECTOR-005
  name: Unresolved incompatibility marks RA-native actualization ambiguity
  domain: motif_actualization
  statement: >
    Unresolved incompatibility at a causal site witnesses certified-ready
    incompatible motif/support-cut alternatives for which neither alternative
    is selected, marking an unresolved local actualization condition for
    downstream saturation or severance analysis.
  formal_anchor: >
    RA_MotifSelectorClosure: DAGUnresolvedIncompatibilityAt;
    GraphUnresolvedIncompatibilityAt
  proof_status: source_level_formal_bridge_draft
  dependencies:
    - RA-MOTIF-SELECTOR-001
    - RA_D3_CausalSeverance
  methodological_guardrails:
    - RA-METHOD-001
    - RA-MOTIF-COMMIT-METHOD-001

- id: RA-MOTIF-SELECTOR-006
  name: Hasse-frontier-selected commitment carries frontier reachability to the site
  domain: motif_actualization
  statement: >
    When selected graph commitment uses a finite Hasse-frontier support cut,
    readiness entails reachability from every Hasse-frontier support vertex to
    the actualization site.
  formal_anchor: >
    RA_MotifSelectorClosure: GraphHasseFrontierSelectedCommitsAt;
    GraphHasseFrontierSelectedCommitsAt.frontier_reaches_site
  proof_status: source_level_formal_bridge_draft
  dependencies:
    - RA-MOTIF-COMMIT-005
    - RA-MOTIF-COMMIT-006
    - RA-MOTIF-SELECTOR-003
  methodological_guardrails:
    - RA-METHOD-001
    - RA-MOTIF-COMMIT-METHOD-001

- id: RA-MOTIF-SELECTOR-METHOD-001
  name: Selector closure is an RA-native actualization layer, not an imported tie-breaker
  domain: framing
  statement: >
    Selector closure in the motif-commit programme is to be developed as an
    RA-native layer over certified-ready motif/support-cut pairs. Simulator
    policies such as greedy lexicographic choice or stalemate recording are
    experimental implementations and are not fundamental RA principles.
  formal_anchor: RA_MotifSelectorClosure
  proof_status: methodological_guardrail
  dependencies:
    - RA-METHOD-001
    - RA-METHOD-002
    - RA-MOTIF-COMMIT-METHOD-001

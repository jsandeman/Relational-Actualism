  domain: complexity
  papers:
  - II
  statement: The v0.5.2 analyzer identifies severance modes whose support/readiness/commitment
    losses saturate across nonzero severity tiers, distinguishing threshold-like support-loss
    regimes from graded-delay regimes.
  nature_targets:
  - threshold-like actualization fragility regimes
  - mode-separable causal-support disruption profiles
  ra_observable: null
  sources:
  - ra_severance_mode_signatures_v0_5_2.csv
  - ra_fragility_by_mode_and_severity_v0_5_2.csv
  proof_dependencies:
  - RA-SIM-SEVERANCE-SIGNATURE-001
  - RA-SIM-MOTIF-SEVERANCE-002
  restoration_preconditions: []
  caveats: The reported threshold behavior is a simulator-regime signature of the

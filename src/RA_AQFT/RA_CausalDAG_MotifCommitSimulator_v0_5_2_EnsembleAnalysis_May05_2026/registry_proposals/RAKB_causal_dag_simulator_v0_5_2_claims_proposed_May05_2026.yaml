- id: RA-SIM-SEVERANCE-SIGNATURE-003
  name: Support delay is separable as readiness and finality shift without support
    loss
  domain: complexity
  papers:
  - II
  statement: The v0.5.2 analyzer classifies support-delay profiles as readiness/commitment
    loss without support loss when support remains certified but reaches actualization
    sites only later, producing finality-depth and recovery-length shifts.
  nature_targets:
  - support-delay actualization signatures
  - finality-depth shift under causal support delay
  ra_observable: null
  sources:
  - ra_finality_shift_by_mode_v0_5_2.csv
  - ra_recovery_length_by_mode_v0_5_2.csv
  proof_dependencies:
  - RA-SIM-SEVERANCE-SIGNATURE-001
  - RA-MOTIF-SEVERANCE-003
  restoration_preconditions: []
  caveats: Support-delay classification depends on the simulator intervention semantics
    and should be checked across larger support-width diversity.
  next_tasks:
  - Check whether support-delay finality shifts remain monotone in the canonical 100-seed
    output.

  name: Ensemble analysis extracts RA-native causal-severance signatures
  domain: complexity
  papers:
  - II
  statement: The v0.5.2 ensemble-analysis layer classifies causal-severance workbench
    outputs into RA-native actualization-fragility signatures using support loss,
    readiness loss, strict-commit loss, selected-commit loss, finality-depth shift,
    recovery length, and support-width summaries.
  nature_targets:
  - RA-native actualization-fragility diagnostics
  - causal-support disruption signatures
  ra_observable: null
  sources:
  - ra_causal_dag_ensemble_analysis.py
  - ra_severance_mode_signatures_v0_5_2.csv
  - ra_severance_signature_summary_v0_5_2.md
  proof_dependencies:
  - RA-SIM-MOTIF-SEVERANCE-001
  - RA-SIM-MOTIF-ENSEMBLE-001
  restoration_preconditions: []

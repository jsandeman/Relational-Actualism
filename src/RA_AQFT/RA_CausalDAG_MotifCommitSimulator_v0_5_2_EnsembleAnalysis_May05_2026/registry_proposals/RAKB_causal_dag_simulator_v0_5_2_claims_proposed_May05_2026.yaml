- id: RA-SIM-SEVERANCE-SIGNATURE-005
  name: Support-width fragility requires frontier-width diversity in the ensemble
  domain: complexity
  papers:
  - II
  statement: The v0.5.2 analyzer reports support-width fragility summaries and explicitly
    flags whether the analyzed ensemble contains enough support-frontier width diversity
    to test support-width fragility curves.
  nature_targets:
  - support-frontier width effects on actualization survival
  - redundant support structure diagnostics
  ra_observable: null
  sources:
  - ra_fragility_by_support_width_v0_5_2.csv
  - ra_severance_signature_summary_v0_5_2.md
  proof_dependencies:
  - RA-SIM-SEVERANCE-SIGNATURE-001
  - RA-SIM-MOTIF-SEVERANCE-005
  restoration_preconditions: []
  caveats: If only support_width=1 appears, the ensemble cannot test width-modulated
    fragility; this is a diagnostic limitation, not a negative result about RA.
  next_tasks:
  - Develop or run ensembles with broader support-frontier widths.

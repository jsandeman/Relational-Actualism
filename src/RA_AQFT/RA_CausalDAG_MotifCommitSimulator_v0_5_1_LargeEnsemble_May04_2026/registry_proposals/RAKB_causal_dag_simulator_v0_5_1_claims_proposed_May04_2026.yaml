    packet_origin: RA_CausalDAG_MotifCommitSimulator_v0_5_1_LargeEnsemble_May04_2026

  - id: RA-SIM-MOTIF-ENSEMBLE-002
    name: Streaming aggregation supports larger causal-severance ensembles without retaining all evaluation rows
    domain: complexity
    papers: [II]
    statement: >
      The v0.5.1 large-ensemble simulator aggregates support loss, readiness loss, strict commitment loss, selected commitment loss, finality shift, and recovery length online, while retaining only a bounded deterministic sample of per-evaluation rows.
    nature_targets:
      - scalable RA-native severance diagnostics
      - ensemble-level actualization-fragility profiles
    ra_observable: null
    sources:
      - ra_causal_dag_ensemble.py
      - ra_causal_dag_ensemble_aggregate_v0_5_1.csv
      - ra_causal_dag_ensemble_summary_v0_5_1.csv
    proof_dependencies:
      - RA-SIM-MOTIF-ENSEMBLE-001
    restoration_preconditions: []
    caveats: >
      Streaming aggregation preserves aggregate diagnostics, not a complete per-evaluation archive. Use sample_limit or full v0.5 output when full row retention is required.
    next_tasks:
      - Add wider ensemble presets and optional stratified target selection.

claims:
  - id: RA-SIM-MOTIF-ENSEMBLE-001
    name: Large-ensemble causal-severance runs preserve v0.5 semantic predicates while using fast final-state generation
    domain: complexity
    papers: [II]
    statement: >
      The v0.5.1 large-ensemble simulator evaluates the same RA-native causal-severance predicates as v0.5 while replacing the audited growth path with a fast final-state generator for ensemble runs.
    nature_targets:
      - RA-native actualization-fragility ensembles on finite causal graphs
      - support/readiness/commitment/finality survival diagnostics across seed families
    ra_observable: null
    sources:
      - ra_causal_dag_ensemble.py
      - test_v0_5_1_large_ensemble.py
      - RA_CausalDAG_MotifCommitSimulator_v0_5_1_LargeEnsemble_Report_May04_2026.md
    proof_dependencies:
      - RA-SIM-MOTIF-SEVERANCE-001
      - RA-SIM-MOTIF-SEVERANCE-002
      - RA-SIM-MOTIF-SEVERANCE-003
      - RA-SIM-MOTIF-SEVERANCE-004
      - RA-SIM-MOTIF-SEVERANCE-005
    restoration_preconditions: []
    caveats: >
      This is simulator engineering, not a new physical correspondence claim. Fast final-state generation is regression-tested against the v0.5 audited final state for fixed seeds.
    next_tasks:
      - Apply ensemble runs to wider support-width regimes and compare fragility strata.
    source_status:
      ra_causal_dag_ensemble.py: simulation_validated_no_forbidden_ra_method_terms
      test_v0_5_1_large_ensemble.py: python_unittest_validated
    legacy_proof_status: DR
